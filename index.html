              ownerName = detectedOwner;
              pick.userName = ownerName;
              var chAvatar = snippet.thumbnails && snippet.thumbnails.default ? snippet.thumbnails.default.url : '';
              if (chAvatar) {
                pick.userAvatarUrl = chAvatar;
                if (typeof avatarCache !== 'undefined' && !avatarCache[chAvatar]) {
                  var avImg = new Image(); avImg.crossOrigin = 'anonymous'; avImg.src = chAvatar;
                  avatarCache[chAvatar] = avImg;
                }
                if (!persistentScores[ownerName]) persistentScores[ownerName] = { score: 0, avatar: chAvatar, color: '#ffdd44' };
                else persistentScores[ownerName].avatar = chAvatar;
              }
              var cfg = JSON.parse(localStorage.getItem('pd_config') || '{}');
              cfg.owner_name = ownerName;
              cfg.channel_title = snippet.title;
              localStorage.setItem('pd_config', JSON.stringify(cfg));
            }
            callback(true);
          })
          .catch(function() { callback(true); });
        } else {
          callback(false);
        }
      } catch(e) { callback(false); }
    }

    function rotateApiKey(failedKey, errorMsg) {

    function startApiPolling() {
      if (_apiCheckInterval) clearInterval(_apiCheckInterval);
      // Rotate key before each poll cycle
      if (getOkKeyCount() > 0) {
        getNextApiKey();

      }
      // Auto-resolve liveChatId on first connect if not persisted
      if (!_liveChatId && _apiConnected) {

      // Poll every 2s, rotate key each call, errors auto-remove key

    // ── Spin Skill Functions ──────────────────────────────────────────────────
    function activateSpin(userName, direction) {
      userName = userName.replace(/^@@+/, '@');
      // Cooldown per direction
      var cdKey = userName + '_' + direction;
      if (spinCooldowns[cdKey] && spinCooldowns[cdKey] > 0) return;
      // Find the player's pick
      var targetPick = null;
      if (pick && pick.userName === userName) targetPick = pick;
      else targetPick = userPicks.find(function(up) { return up.userName === userName; });
      if (!targetPick) return;

      var dir = { x: 0, y: 0 };
      if (direction === 'right') dir.x = 1;
      else if (direction === 'left') dir.x = -1;
      else if (direction === 'down') dir.y = 1;
      else if (direction === 'up') dir.y = -1;
      else return;

      // Init queue for this player
      if (!spinQueues[userName]) spinQueues[userName] = [];
      // Don't exceed max queue
      if (spinQueues[userName].length >= SPIN_MAX_QUEUE) return;
      // Don't queue same direction twice in a row
      var q = spinQueues[userName];
      if (q.length > 0 && q[q.length - 1].direction === direction) return;

      spinQueues[userName].push({ direction: direction, dir: dir, pick: targetPick });
      spinCooldowns[cdKey] = SPIN_COOLDOWN;

      // If no active spin for this player, start immediately
      if (!activeSpins.some(function(s) { return s.userName === userName; })) {
        startNextSpin(userName);
      } else {
        spawnText(targetPick.x, targetPick.y - 40, '🌀 +' + direction.toUpperCase(), '#cc44ff');
      }
    }

    function startNextSpin(userName) {
      if (!spinQueues[userName] || spinQueues[userName].length === 0) return;
      var next = spinQueues[userName].shift();
      var p = next.pick;
      if (!p) return;

      activeSpins.push({
        pick: p,
        userName: userName,
        direction: next.direction,
        dir: next.dir,
        phase: 'charge',
        timer: SPIN_CHARGE,
        totalTimer: SPIN_CHARGE,
        origSpin: p.spin,
        color: p.color || '#ff44ff'
      });
      spawnText(p.x, p.y - 40, '🌀 SPIN ' + next.direction.toUpperCase() + '!', p.color || '#ff44ff');
      if (_audioStarted) sfxSpinCharge();
    }

    function updateSpins() {
      // Decrement cooldowns
      for (var u in spinCooldowns) {
        if (spinCooldowns[u] > 0) spinCooldowns[u]--;
      }
      for (var i = activeSpins.length - 1; i >= 0; i--) {
        var s = activeSpins[i];
        var p = s.pick;
        if (!p) { activeSpins.splice(i, 1); continue; }

        if (s.phase === 'charge') {
          p._spinLock = false;
          var chargeProgress = 1 - (s.timer / s.totalTimer);
          p.spin = s.origSpin + chargeProgress * 2.5;
          p.vx *= 0.85; p.vy *= 0.85;
          if (s.timer % 3 === 0) {
            var pa = Math.random() * Math.PI * 2;
            var pr = 20 + Math.random() * 20;
            parts.push({ x: p.x + Math.cos(pa) * pr, y: p.y + Math.sin(pa) * pr, vx: -Math.cos(pa) * 2, vy: -Math.sin(pa) * 2, life: 15, color: s.color, r: 3 + Math.random() * 3 });
          }
          s.timer--;
          if (s.timer <= 0) {
            s.phase = 'dash';
            s.timer = SPIN_DASH;
            p.stuck = false;
            p.stuckTimer = 0;
            if (_audioStarted) sfxSpinDash();
          }
        } else if (s.phase === 'dash') {
          p._spinLock = true;
          // Lock rotation to spin direction: right=0, down=PI/2, left=PI, up=-PI/2
          var targetAng = Math.atan2(s.dir.y, s.dir.x);
          p.ang = targetAng + (s.timer * 0.8); // fast spin around the direction axis
          p.spin = 0; // we control ang directly
          p.stuck = false;
          p.stuckTimer = 0;
          var stepX = s.dir.x * SPIN_SPEED;
          var stepY = s.dir.y * SPIN_SPEED;
          p.x += stepX;
          p.y += stepY;
          // Lock velocity to spin direction only
          p.vx = stepX;
          p.vy = stepY;
          // Zero out the perpendicular axis so it doesn't drift
          if (s.dir.x !== 0) p.vy = 0;
          if (s.dir.y !== 0) p.vx = 0;
          if (s.dir.y <= 0) p.vy -= GRAVITY;
          var bpr = PICK_HALF + 10;
          var c0 = Math.floor((p.x - bpr) / TILE), c1 = Math.floor((p.x + bpr) / TILE);
          var r0 = Math.floor((p.y - bpr) / TILE), r1 = Math.floor((p.y + bpr) / TILE);
          for (var row = r0; row <= r1; row++) {
            if (!worldMap[row]) continue;
            for (var col = c0; col <= c1; col++) {
              if (col < 0 || col >= COLS) continue;
              var cell = worldMap[row] ? worldMap[row][col] : null;
              if (cell && cell.t !== E && cell.t !== BEDROCK) {
                var pPick = p.pickaxe || currentPickaxe;
                var dmg = Math.max(3, Math.floor(SPIN_DMG_MULT * (pPick ? pPick.damage : 1)));
                hitBlock(col, row, dmg, p);
              }
            }
          }
          if (s.timer % 2 === 0) {
            // Sparks flying outward
            for (var sp = 0; sp < 2; sp++) {
              var sparkAng = Math.atan2(s.dir.y, s.dir.x) + Math.PI + (Math.random() - 0.5) * 1.5;
              parts.push({
                x: p.x + (Math.random() - 0.5) * 16,
                y: p.y + (Math.random() - 0.5) * 16,
                vx: Math.cos(sparkAng) * (3 + Math.random() * 4),
                vy: Math.sin(sparkAng) * (3 + Math.random() * 4),
                life: 8 + Math.random() * 6,
                color: Math.random() < 0.5 ? '#ffaa00' : s.color,
                r: 1.5 + Math.random() * 2
              });
            }
          }
          if (p.x < PICK_HALF) { p.x = PICK_HALF; s.timer = 0; }
          if (p.x > COLS * TILE - PICK_HALF) { p.x = COLS * TILE - PICK_HALF; s.timer = 0; }
          if (p.y < PICK_HALF) { p.y = PICK_HALF; s.timer = 0; }
          s.timer--;
          if (s.timer <= 0) {
            p._spinLock = false;
            p.spin = s.origSpin;
            p.vx = s.dir.x * 3; p.vy = s.dir.y * 3;
            activeSpins.splice(i, 1);
            // Start next queued spin for this player
            startNextSpin(s.userName);
          }
        }
      }
    }

    function drawSpinAura(p) {
      var spin = null;
      for (var i = 0; i < activeSpins.length; i++) {
        if (activeSpins[i].pick === p) { spin = activeSpins[i]; break; }
      }
      if (!spin) return;
      var sc = spin.color || '#ff44ff';
      ctx.save();
      if (spin.phase === 'charge') {
        var prog = 1 - (spin.timer / spin.totalTimer);
        var r = 30 + prog * 20;
        ctx.globalAlpha = 0.3 + prog * 0.4;
        ctx.strokeStyle = sc;
        ctx.lineWidth = 2 + prog * 3;
        ctx.shadowBlur = 10 + prog * 15;
        ctx.shadowColor = sc;
        ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2); ctx.stroke();
        // Inner spinning ring
        ctx.globalAlpha = 0.3 + prog * 0.5;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5;
        ctx.shadowBlur = 8;
        ctx.shadowColor = sc;
        var ringAng = Date.now() * 0.015;
        ctx.beginPath();
        ctx.arc(p.x, p.y, r * 0.6, ringAng, ringAng + Math.PI * 1.2);
        ctx.stroke();
        // Bright center glow
        ctx.shadowBlur = 0;
        ctx.globalAlpha = prog * 0.4;
        ctx.fillStyle = 'rgba(255,255,255,' + (prog * 0.3) + ')';
        ctx.beginPath(); ctx.arc(p.x, p.y, r * 0.4, 0, Math.PI * 2); ctx.fill();
      } else {
        // Dash: speed lines in player color
        var trailLen = 45;
        var perpX = -spin.dir.y, perpY = spin.dir.x;
        for (var li = 0; li < 5; li++) {
          var offset = (li - 2) * 10;
          var sx = p.x - spin.dir.x * trailLen + perpX * offset;
          var sy = p.y - spin.dir.y * trailLen + perpY * offset;
          ctx.globalAlpha = 0.15 + (2 - Math.abs(li - 2)) * 0.1;
          ctx.strokeStyle = sc;
          ctx.lineWidth = 3 - Math.abs(li - 2) * 0.5;
          ctx.shadowBlur = 6;
          ctx.shadowColor = sc;
          ctx.beginPath();
          ctx.moveTo(sx, sy);
          ctx.lineTo(p.x + perpX * offset, p.y + perpY * offset);
          ctx.stroke();
        }
        // Bright glow around pick
        ctx.shadowBlur = 0;
        var pulse = 0.7 + Math.sin(spin.timer * 0.6) * 0.3;
        var gr = 32 * pulse;
        var grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, gr);
        grd.addColorStop(0, 'rgba(255,255,255,0.25)');
        grd.addColorStop(0.4, 'rgba(255,255,255,0.12)');
        grd.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.globalAlpha = 0.7;
        ctx.fillStyle = grd;
        ctx.beginPath(); ctx.arc(p.x, p.y, gr, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();
    }

    function sfxSpinCharge() {
      var ac = getAC(); if (!ac) return;
      var t = ac.currentTime;
      var osc = ac.createOscillator(); var g = ac.createGain();
      osc.type = 'triangle'; osc.frequency.setValueAtTime(80, t);
      osc.frequency.exponentialRampToValueAtTime(300, t + 0.45);
      g.gain.setValueAtTime(0.18, t); g.gain.linearRampToValueAtTime(0, t + 0.5);
      osc.connect(g); g.connect(ac.destination);
      osc.start(t); osc.stop(t + 0.5);
    }

    function sfxSpinDash() {
      var ac = getAC(); if (!ac) return;
      var t = ac.currentTime;
      var osc = ac.createOscillator(); var g = ac.createGain();
      osc.type = 'triangle'; osc.frequency.setValueAtTime(250, t);
      osc.frequency.exponentialRampToValueAtTime(60, t + 0.35);
      g.gain.setValueAtTime(0.22, t); g.gain.linearRampToValueAtTime(0, t + 0.45);
      osc.connect(g); g.connect(ac.destination);
      osc.start(t); osc.stop(t + 0.45);
    }

    function updateLeaderboard() {
      // Update pickaxe tier for all userPicks
      for (var i = 0; i < userPicks.length; i++) {
        userPicks[i].pickaxe = getPickaxeForTime(userPicks[i].joinTime);
      }

      var list = document.getElementById('leaderboardList');
      if (!list) return;

      var now = Date.now();
      // Only show active players (with activity in last 3 min) + owner always visible
      var activePlayers = Object.keys(persistentScores).filter(function (name) {
        if (ownerName && name === ownerName) return true; // owner always in leaderboard
        return lastActivity[name] && (now - lastActivity[name] <= INACTIVE_MS);
      }).map(function (name) {
        // Find pickaxe tier for this player
        var pTier = currentPickaxe; // default for owner
        if (ownerName && name === ownerName) {
          pTier = currentPickaxe;
        } else {
          for (var j = 0; j < userPicks.length; j++) {
            if (userPicks[j].userName === name) { pTier = userPicks[j].pickaxe || PICKAXES[0]; break; }
          }
        }
        return {
          userName: name,
          score: persistentScores[name].score,
          userAvatarUrl: persistentScores[name].avatar,
          pickaxe: pTier
        };
      });

      var sorted = activePlayers
        .sort((a, b) => (b.score || 0) - (a.score || 0))
        .slice(0, 10);

      if (sorted.length === 0) {
        list.innerHTML = '<div style="text-align:center; opacity:0.5; font-size:12px;">Waiting for players...</div>';
        return;
      }

      var html = '';
      sorted.forEach((u, i) => {
        var av = u.userAvatarUrl || '';
        var pickImg = u.pickaxe ? u.pickaxe.img : 'pickaxe/wooden_pickaxe.png';
        var pickName = u.pickaxe ? u.pickaxe.name : 'Wood';
        var pickColor = u.pickaxe ? u.pickaxe.color : '#c8a464';
        html += `<div class="lb-item"><span class="lb-rank">#${i + 1}</span><img class="lb-avatar" src="${av}" onerror="this.src='pickaxe/wooden_pickaxe.png'"><span class="lb-name">${u.userName}</span><img class="lb-pickaxe" src="${pickImg}" title="${pickName}"><span class="lb-score" style="color:${pickColor}">${Math.floor(u.score || 0)}</span></div>`;
      });
      list.innerHTML = html;
    }
    setInterval(updateLeaderboard, 1000);

    // Remove inactive players every 30s
    setInterval(function () {
      var now = Date.now();
      for (var i = userPicks.length - 1; i >= 0; i--) {
        var up = userPicks[i];
        if (up.isStorm) continue; // storm picks are not real players
        var last = lastActivity[up.userName] || 0;
        if (now - last > INACTIVE_MS) {
          userPicks.splice(i, 1);
        }
      }
    }, 30000); // atualiza a cada 1s

    // ── Eventos do Botrix (follow, superchat, member, gift) ──
    function triggerBotrixEvent(type, name, avatar) {
      var cx = pick ? pick.x : canvas.width / 2;
      var cy = pick ? pick.y : camY + canvas.height * 0.5;
      var config = {
        follow:    { icon: '⭐', title: 'NEW FOLLOWER!',          color: '#44ff88', pts: 200,  dur: 150 },
        superchat: { icon: '💎', title: 'SUPER CHAT!',            color: '#ffdd44', pts: 1000, dur: 200 },
        member:    { icon: '👑', title: 'NEW MEMBER!',            color: '#ff44ff', pts: 500,  dur: 180 },
        gift:      { icon: '🎁', title: 'GIFTED MEMBERSHIP!',     color: '#44ddff', pts: 800,  dur: 200 }
      };
      var cfg = config[type];
      if (!cfg) return;

      // buscar avatar automaticamente se não fornecido
      if (!avatar) {
        // tentar userPicks
        var up = userPicks.find(function(u){ return u.userName === name; });
        if (up && up.avatarUrl) { avatar = up.avatarUrl; }
        // tentar persistentScores
        if (!avatar && persistentScores[name] && persistentScores[name].avatar) {
          avatar = persistentScores[name].avatar;
        }
        // tentar ranking carregado
        if (!avatar && rankingData.length > 0) {
          var rk = rankingData.find(function(r){ return r.user === name || r.user === '@' + name; });
          if (rk && rk.avatarUrl) avatar = rk.avatarUrl;
        }
      }

      // avatar HTML
      var avatarHtml = '';
      if (avatar) {
        avatarHtml = '<img class="announce-avatar" src="' + avatar + '" style="border-color:' + cfg.color + ';box-shadow:0 0 12px ' + cfg.color + '" />';
      } else {
        avatarHtml = '<div class="announce-avatar-placeholder" style="border-color:' + cfg.color + ';box-shadow:0 0 12px ' + cfg.color + '">' + cfg.icon + '</div>';
      }

      // anúncio centralizado (DOM overlay)
      var overlay = document.getElementById('announceOverlay');
      var card = document.createElement('div');
      card.className = 'announce-card';
      card.style.border = '2px solid ' + cfg.color;
      card.style.boxShadow = '0 0 30px ' + cfg.color + ', inset 0 0 20px rgba(0,0,0,0.3)';
      card.innerHTML =
        avatarHtml +
        '<div class="announce-title" style="color:' + cfg.color + ';text-shadow:0 0 12px ' + cfg.color + '">' + cfg.title + '</div>' +
        '<div class="announce-name">' + name + '</div>' +
        '<div class="announce-pts" style="color:' + cfg.color + '">+' + cfg.pts + ' pts</div>';
      overlay.appendChild(card);

      // fade out e remover após duração
      var displayMs = cfg.dur * 16.67; // frames → ms
      setTimeout(function () {
        card.classList.add('fade-out');
        setTimeout(function () { if (card.parentNode) card.parentNode.removeChild(card); }, 500);
      }, displayMs);

      // pontos
      score += cfg.pts;
      spawnText(cx, cy + 15, '+' + cfg.pts, cfg.color);
      if (_audioStarted) sfxSkillActivate();

      // Confetti rain
      var confettiColors = ['#ff4444','#44ff44','#4444ff','#ffff44','#ff44ff','#44ffff','#ff8800','#ffffff'];
      for (var ci = 0; ci < 40; ci++) {
        parts.push({
          x: cx + (Math.random() - 0.5) * canvas.width * 0.8,
          y: cy - 200 - Math.random() * 300,
          vx: (Math.random() - 0.5) * 6,
          vy: 1 + Math.random() * 3,
          life: 1, dec: 0.005 + Math.random() * 0.005,
          r: 3 + Math.random() * 4,
          c: confettiColors[Math.floor(Math.random() * confettiColors.length)]
        });
      }
      // Firework bursts
      for (var fi = 0; fi < 3; fi++) {
        var fx = cx + (Math.random() - 0.5) * 300;
        var fy = cy - 100 - Math.random() * 200;
        for (var fj = 0; fj < 15; fj++) {
          var fa = Math.random() * Math.PI * 2;
          var fs = 3 + Math.random() * 5;
          parts.push({
            x: fx, y: fy,
            vx: Math.cos(fa) * fs,
            vy: Math.sin(fa) * fs,
            life: 1, dec: 0.02 + Math.random() * 0.02,
            r: 2 + Math.random() * 3,
            c: cfg.color
          });
        }
      }

      // efeitos por tipo
      if (type === 'follow') {
        for (var i = 0; i < 3; i++) activateTNT(cx + (i - 1) * TILE * 2, cy, name, '');
      }
      else if (type === 'superchat') {
        for (var i = 0; i < 2; i++) activateMegaTNT(cx + (i - 0.5) * TILE * 3, cy, name, '');
        shakeAmt = Math.max(shakeAmt, 18);
      }
      else if (type === 'member') {
        for (var i = 0; i < 5; i++) activateTNT(cx + (i - 2) * TILE * 1.5, cy, name, '');
        activateMegaTNT(cx, cy, name, '');
      }
      else if (type === 'gift') {
        activateMegaTNT(cx - TILE * 2, cy, name, '');
        activateMegaTNT(cx + TILE * 2, cy, name, '');
        for (var i = 0; i < 8; i++) activateTNT(cx + (Math.random() - 0.5) * TILE * 8, cy, name, '');
        shakeAmt = Math.max(shakeAmt, 22);
      }
    }

    function clearLiveChatId() {
      _liveChatId = '';
      if (_userChannelId) {
        localStorage.removeItem('pd_live_chat_' + _userChannelId);
      }
    }

    var _resolvingLive = false;
    function resolveLive(callback) {
      var apiKey = getCurrentApiKey();
      if (_resolvingLive || !_apiConnected || !apiKey || !_userChannelId) {
        if (callback) callback(false);
        return;
      }
      _resolvingLive = true;
      var txtLive = document.getElementById('statusTextLive');
      var dotLive = document.getElementById('statusDotLive');
      if (txtLive) { txtLive.textContent = 'Live: ...'; txtLive.style.color = '#ffaa00'; }
      if (dotLive) { dotLive.classList.remove('online'); dotLive.classList.add('warning'); }

      // Search for active live stream directly via YouTube API
      fetch('https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=' + encodeURIComponent(_userChannelId) + '&type=video&eventType=live&key=' + encodeURIComponent(apiKey))
      .then(function(r) { return r.json().catch(function() { throw new Error('Network error: ' + r.status); }); })
      .then(function(data) {
        console.log('[resolveLive] search response:', JSON.stringify(data).substring(0, 300));
        if (data.error) {
          console.warn('[resolveLive] API error:', data.error.message, 'code:', data.error.code);
          _resolvingLive = false;
          // Only mark key failed on quota/403
          if (data.error.code === 403) {
            markKeyFailed(apiKey, 'quota/403 on search');
          } else {
            getNextApiKey(); // rotate, don't remove
          }
          if (dotLive) { dotLive.classList.remove('online'); dotLive.classList.add('warning'); }
          if (txtLive) { txtLive.textContent = 'Live: Error ' + (data.error.code || ''); txtLive.style.color = '#ff4444'; }
          if (callback) callback(false);
          return;
        }
        if (!data.items || data.items.length === 0) {
          console.log('[resolveLive] No active live found for channel', _userChannelId);
          _resolvingLive = false;
          _liveChatId = '';
          if (dotLive) { dotLive.classList.remove('online'); dotLive.classList.add('warning'); }
          if (txtLive) { txtLive.textContent = 'Live: OFF (not found)'; txtLive.style.color = '#ffaa00'; }
          if (callback) callback(false);
          return;
        }
        var videoId = data.items[0].id.videoId;
        console.log('[resolveLive] Found live video:', videoId);
        var apiKey2 = getCurrentApiKey(); // get fresh key for second call
        return fetch('https://www.googleapis.com/youtube/v3/videos?part=liveStreamingDetails&id=' + encodeURIComponent(videoId) + '&key=' + encodeURIComponent(apiKey2))
        .then(function(r) { return r.json().catch(function() { throw new Error('Network error: ' + r.status); }); })
        .then(function(vdata) {
          _resolvingLive = false;
          if (vdata.items && vdata.items[0] && vdata.items[0].liveStreamingDetails && vdata.items[0].liveStreamingDetails.activeLiveChatId) {
            _liveChatId = vdata.items[0].liveStreamingDetails.activeLiveChatId;
            localStorage.setItem('pd_live_chat_' + _userChannelId, _liveChatId);
            if (dotLive) { dotLive.classList.remove('warning'); dotLive.classList.add('online'); }
            if (txtLive) { txtLive.textContent = 'Live: ON'; txtLive.style.color = '#00ff88'; }
            if (callback) callback(true);
          } else {
            _liveChatId = '';
            if (dotLive) { dotLive.classList.remove('online'); dotLive.classList.add('warning'); }
            if (txtLive) { txtLive.textContent = 'Live: OFF'; txtLive.style.color = '#ffaa00'; }
            if (callback) callback(false);
          }
        });
      })
      .catch(function() {
        _resolvingLive = false;
        if (callback) callback(false);
      });
    }

    var _nextPageToken = '';
    var _lastResolveTry = 0;
    function checkConnection() {
      if (!_apiConnected || !_userChannelId) return;
      var apiKey = getCurrentApiKey();
      if (!apiKey) return;

      // If no liveChatId, try to auto-resolve every 60s
      if (!_liveChatId) {
        var dotApi = document.getElementById('statusDotApi');
        var txtApi = document.getElementById('statusTextApi');
        var dotLive = document.getElementById('statusDotLive');
        var txtLive = document.getElementById('statusTextLive');
        if (dotApi) dotApi.classList.add('online');
        if (txtApi) { txtApi.textContent = apiStatusText(); txtApi.style.color = '#00ff88'; }
        if (dotLive) { dotLive.classList.remove('online'); dotLive.classList.add('warning'); }
        if (txtLive) { txtLive.textContent = 'Live: OFF'; txtLive.style.color = '#ffaa00'; txtLive.style.cursor = 'pointer'; txtLive.title = 'Click to search for live'; }
        var now = Date.now();
        if (now - _lastResolveTry > 60000) {
          _lastResolveTry = now;
          resolveLive();
        }
        return;
      }

      // Fetch live chat messages directly from YouTube API
      var chatUrl = 'https://www.googleapis.com/youtube/v3/liveChat/messages?liveChatId=' + encodeURIComponent(_liveChatId) + '&part=snippet,authorDetails&maxResults=200&key=' + encodeURIComponent(apiKey);
      if (_nextPageToken) chatUrl += '&pageToken=' + encodeURIComponent(_nextPageToken);

      fetch(chatUrl)
        .then(function(r) { return r.json().catch(function() { throw new Error('Network error: ' + r.status); }); })
        .then(function(data) {
          var dotApi = document.getElementById('statusDotApi');
          var txtApi = document.getElementById('statusTextApi');
          var dotLive = document.getElementById('statusDotLive');
          var txtLive = document.getElementById('statusTextLive');

          if (data.error) {
            var errMsg = data.error.message || '';
            var errCode = data.error.code || 0;
            var usedKey = apiKey; // capture before rotation
            // Quota exceeded or forbidden — remove this key, keep polling with others
            if (errCode === 403 || errMsg.toLowerCase().indexOf('quota') !== -1) {
              console.warn('[checkConnection] Key quota/403, removing:', usedKey.substring(0, 8) + '...', errMsg);
              rotateApiKey(usedKey, 'quota/' + errCode);
              // DON'T stop polling — other keys may still work
              if (getOkKeyCount() === 0) {
                if (_apiCheckInterval) { clearInterval(_apiCheckInterval); _apiCheckInterval = null; }
                if (dotApi) dotApi.classList.remove('online');
                if (txtApi) { txtApi.textContent = 'API: no keys'; txtApi.style.color = '#ff4444'; }
                if (dotLive) dotLive.classList.remove('online');
                if (txtLive) { txtLive.textContent = 'Live: paused'; txtLive.style.color = '#888'; }
              }
              return;
            }
            // Live ended or invalid chat — not a key problem, just rotate and retry
            if (errCode === 404 || errCode === 400) {
              console.log('[checkConnection] Live error ' + errCode + ', clearing chat ID');
              clearLiveChatId();
              getNextApiKey(); // rotate but don't remove
              if (dotApi) dotApi.classList.add('online');
              if (txtApi) { txtApi.textContent = apiStatusText(); txtApi.style.color = '#00ff88'; }
              if (dotLive) { dotLive.classList.remove('online'); dotLive.classList.add('warning'); }
              if (txtLive) { txtLive.textContent = 'Live: reconnecting...'; txtLive.style.color = '#ffaa00'; }
              resolveLive();
              return;
            }
            // Any other error — just rotate to next key, don't remove
            console.warn('[checkConnection] Error ' + errCode + ', rotating key:', usedKey.substring(0, 8) + '...');
            getNextApiKey();
            return;
          }

          // Success
          if (data.nextPageToken) _nextPageToken = data.nextPageToken;
          if (dotApi) dotApi.classList.add('online');
          if (txtApi) { txtApi.textContent = apiStatusText(); txtApi.style.color = '#00ff88'; }
          if (dotLive) { dotLive.classList.remove('warning'); dotLive.classList.add('online'); }
          if (txtLive) { txtLive.textContent = 'Live: ON'; txtLive.style.color = '#00ff88'; }

          // Process chat messages
          if (data.items && data.items.length > 0) {
            if (!_firstFetchDone) {
              data.items.forEach(function(item) { processedComments.add(item.id); });
              _firstFetchDone = true;
            } else {
              data.items.forEach(function(item) {
                if (processedComments.has(item.id)) return;
                processedComments.add(item.id);
                var cUser = (item.authorDetails.displayName || '').replace(/^@@+/, '@');
                if (cUser && cUser[0] !== '@') cUser = '@' + cUser;
                var cAvatarUrl = item.authorDetails.profileImageUrl || '';
                var cText = item.snippet.displayMessage || '';
                lastActivity[cUser] = Date.now();

                var isOwner = _userChannelId && item.authorDetails.channelId === _userChannelId;
                if (isOwner) {
                  // Update ownerName to match actual display name from chat
                  ownerName = cUser;
                  pick.userName = ownerName;
                  if (cAvatarUrl) {
                    pick.userAvatarUrl = cAvatarUrl;
                    if (!avatarCache[cAvatarUrl]) {
                      var avImg = new Image(); avImg.crossOrigin = 'anonymous'; avImg.src = cAvatarUrl;
                      avatarCache[cAvatarUrl] = avImg;
                    }
                  }
                  if (!persistentScores[ownerName]) persistentScores[ownerName] = { score: 0, avatar: cAvatarUrl || '', color: '#ffdd44' };
                  else if (cAvatarUrl) persistentScores[ownerName].avatar = cAvatarUrl;
                }

                if (!isOwner && persistentScores[cUser] && !userPicks.some(function(up){ return up.userName === cUser; })) {
                  spawnUserPickaxe(cUser, cAvatarUrl);
                }
                var msg = cText.toLowerCase();
                if (!isOwner && (msg.includes("join") || msg.includes("play"))) {
                  spawnUserPickaxe(cUser, cAvatarUrl);
                }
                var userPick = isOwner ? pick : userPicks.find(function(up) { return up.userName === cUser; });
                var tx = userPick ? userPick.x : undefined;
                var ty = userPick ? userPick.y : undefined;

                if (msg.includes("power tnt") || msg.includes("mega tnt") || msg.includes("powertnt")) {
                  activateMegaTNT(tx, ty, cUser, cAvatarUrl);
                } else if (msg.includes("tnt")) {
                  activateTNT(tx, ty, cUser, cAvatarUrl);
                }

                if (msg.includes("clone")) {
                  spawnClone(cUser, cAvatarUrl);
                }

                // Spin skill: spin right/left/down/up or shortcuts sr/sl/sd/su
                var spinMatch = msg.match(/spin\s+(right|left|down|up)/);
                if (!spinMatch) {
                  var shortcut = msg.match(/\b(sr|sl|sd|su)\b/);
                  if (shortcut) {
                    var sMap = { sr: 'right', sl: 'left', sd: 'down', su: 'up' };
                    spinMatch = [null, sMap[shortcut[1]]];
                  }
                }
                if (spinMatch) {
                  activateSpin(cUser, spinMatch[1]);
                }

                if (msg.includes("bot20ok")) {
                  for (var bi = 0; bi < 20; bi++) {
                    var botName = '@Bot_' + (1 + Math.floor(Math.random() * 9999));
                    var botAvatar = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(botName) + '&background=random&size=100';
                    spawnUserPickaxe(botName, botAvatar);
                  }
                  spawnText(canvas.width / 2, camY + 100, '20 BOTS ADDED!', '#ffff00');
                }

                // ── Eventos do Botrix ──
                var rawMsg = cText;
                var botrixName = null;
                var botrixAvatar = null;

                var followMatch = rawMsg.match(/thank you for the follow @?(\S+)/i);
                if (followMatch) {
                  botrixName = followMatch[1];
                  var fp = userPicks.find(function(u){ return u.userName === botrixName; });
                  botrixAvatar = fp ? fp.userAvatarUrl : null;
                  triggerBotrixEvent('follow', botrixName, botrixAvatar);
                }
                var scMatch = rawMsg.match(/thanks @?(\S+) for the superchat/i);
                if (scMatch) {
                  botrixName = scMatch[1];
                  var sp = userPicks.find(function(u){ return u.userName === botrixName; });
                  botrixAvatar = sp ? sp.userAvatarUrl : null;
                  triggerBotrixEvent('superchat', botrixName, botrixAvatar);
                }
                var memberMatch = rawMsg.match(/thank you for the member @?(\S+)/i);
                if (memberMatch) {
                  botrixName = memberMatch[1];
                  var mp = userPicks.find(function(u){ return u.userName === botrixName; });
                  botrixAvatar = mp ? mp.userAvatarUrl : null;
                  triggerBotrixEvent('member', botrixName, botrixAvatar);
                }
                var giftMatch = rawMsg.match(/thank you for gifting a member @?(\S+)/i);
                if (giftMatch) {
                  botrixName = giftMatch[1];
                  var gp = userPicks.find(function(u){ return u.userName === botrixName; });
                  botrixAvatar = gp ? gp.userAvatarUrl : null;
                  triggerBotrixEvent('gift', botrixName, botrixAvatar);
                }
              });
            }
          }
        })
        .catch(function() {
          var dotApi = document.getElementById('statusDotApi');
          var txtApi = document.getElementById('statusTextApi');
          var dotLive = document.getElementById('statusDotLive');
          var txtLive = document.getElementById('statusTextLive');
          if (dotApi) dotApi.classList.remove('online');
          if (txtApi) { txtApi.textContent = 'API: Offline'; txtApi.style.color = '#ff4444'; }
          if (dotLive) dotLive.classList.remove('online');
          if (txtLive) { txtLive.textContent = 'Live: —'; txtLive.style.color = '#888'; }
        });
    }

  </script>
