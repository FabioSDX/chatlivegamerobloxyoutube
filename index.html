    // ── Background: Caverna com Cristais ──────────────────────────────────────────
    var bgTick = 0;
    var bgChunks = {};
    var BG_CHUNK = 5;

    function bgRng(seed) {
      return function () { seed = (seed * 1664525 + 1013904223) & 0xffffffff; return (seed >>> 0) / 0xffffffff; };
    }

    function bgPalette(depth) {
      if (depth < 12) return { bg1: '#04081a', bg2: '#080e2a', crystals: ['#1a5aaa', '#2277ee', '#44aaff', '#88ccff', '#cceeff'], vein: '#3366cc', fog: '#1a3a8a' };
      if (depth < 25) return { bg1: '#0d0420', bg2: '#1a0830', crystals: ['#771aaa', '#8844dd', '#bb66ff', '#ddaaff', '#f0ddff'], vein: '#7722bb', fog: '#3a1a6a' };
      if (depth < 50) return { bg1: '#001a12', bg2: '#00281e', crystals: ['#007755', '#00bb88', '#33ffcc', '#88ffee', '#ccffee'], vein: '#00aa66', fog: '#004433' };
      return { bg1: '#1a0800', bg2: '#2e0e00', crystals: ['#aa3300', '#ee5500', '#ff8833', '#ffbb77', '#ffeedd'], vein: '#cc4400', fog: '#441100' };
    }

    function getBgChunk(ci) {
      if (bgChunks[ci]) return bgChunks[ci];
      var rng = bgRng(ci * 6271 + 9337);
      var chunkH = BG_CHUNK * TILE, chunkY = ci * chunkH, depth = ci * BG_CHUNK;
      var pal = bgPalette(depth);
      var items = [];
      // cristais grandes de fundo
      for (var i = 0; i < 6; i++) {
        var x = TILE * 1.5 + rng() * (canvas.width - TILE * 3);
        var y = chunkY + rng() * chunkH;
        var h = 60 + rng() * 120, w = 10 + rng() * 18;
        items.push({ type: 'crystal', x: x, y: y, h: h, w: w, col: pal.crystals[0 | rng() * pal.crystals.length], flip: rng() > 0.5, alpha: 0.12 + rng() * 0.14, phase: rng() * Math.PI * 2, spd: 0.006 + rng() * 0.01, layer: 0 });
      }
      // cristais médios
      for (var i = 0; i < 9; i++) {
        var x = TILE + rng() * (canvas.width - TILE * 2);
        var y = chunkY + rng() * chunkH;
        var h = 30 + rng() * 80, w = 6 + rng() * 13;
        items.push({ type: 'crystal', x: x, y: y, h: h, w: w, col: pal.crystals[0 | rng() * pal.crystals.length], flip: rng() > 0.5, alpha: rng() * 0.28, phase: rng() * Math.PI * 2, spd: 0.01 + rng() * 0.018, layer: 1 });
      }
      // cristais pequenos brilhantes (frente)
      for (var i = 0; i < 8; i++) {
        var x = TILE + rng() * (canvas.width - TILE * 2);
        var y = chunkY + rng() * chunkH;
        var h = 12 + rng() * 35, w = 3 + rng() * 7;
        items.push({ type: 'crystal', x: x, y: y, h: h, w: w, col: pal.crystals[0 | rng() * pal.crystals.length], flip: rng() > 0.5, alpha: 0.5 + rng() * 0.45, phase: rng() * Math.PI * 2, spd: 0.018 + rng() * 0.03, layer: 2 });
      }
      // veias de minério
      for (var i = 0; i < 5; i++) {
        var x1 = rng() * canvas.width, y1 = chunkY + rng() * chunkH;
        var len = 40 + rng() * 120, ang = (rng() - 0.5) * 1.2;
        items.push({ type: 'vein', x1: x1, y1: y1, x2: x1 + Math.cos(ang) * len, y2: y1 + Math.sin(ang) * len, col: pal.vein, w: 1 + rng() * 2.5, alpha: 0.08 + rng() * 0.25, phase: rng() * Math.PI * 2, spd: 0.005 + rng() * 0.02 });
      }
      // pontos de luz (orbs)
      for (var i = 0; i < 4; i++) {
        items.push({ type: 'orb', x: TILE + rng() * (canvas.width - TILE * 2), y: chunkY + rng() * chunkH, r: 18 + rng() * 45, col: pal.crystals[0 | rng() * pal.crystals.length], alpha: 0.06 + rng() * 0.1, phase: rng() * Math.PI * 2, spd: 0.007 + rng() * 0.015 });
      }
      bgChunks[ci] = { items: items, pal: pal };
      return bgChunks[ci];
    }

    function drawCrystalShape(cx, x, sy, w, h, flip) {
      cx.beginPath();
      if (!flip) {
        cx.moveTo(x, sy); cx.lineTo(x - w / 2, sy + h * 0.22);
        cx.lineTo(x - w * 0.4, sy + h * 0.55); cx.lineTo(x - w / 2, sy + h * 0.78);
        cx.lineTo(x, sy + h); cx.lineTo(x + w / 2, sy + h * 0.78);
        cx.lineTo(x + w * 0.4, sy + h * 0.55); cx.lineTo(x + w / 2, sy + h * 0.22);
      } else {
        cx.moveTo(x, sy + h); cx.lineTo(x - w / 2, sy + h * 0.78);
        cx.lineTo(x - w * 0.4, sy + h * 0.45); cx.lineTo(x - w / 2, sy + h * 0.22);
        cx.lineTo(x, sy); cx.lineTo(x + w / 2, sy + h * 0.22);
        cx.lineTo(x + w * 0.4, sy + h * 0.45); cx.lineTo(x + w / 2, sy + h * 0.78);
      }
      cx.closePath();
    }

    function drawBackground() {
      bgTick++;
      var W = canvas.width, H = canvas.height;
      var t = Math.min(1, camY / (60 * TILE));

      // gradiente de fundo
      var chunkMid = Math.floor((camY / TILE + VIS / 2) / BG_CHUNK);
      var pal = (getBgChunk(chunkMid)).pal;
      var grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, pal.bg1); grad.addColorStop(0.6, pal.bg2); grad.addColorStop(1, pal.bg1);
      ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

      // Mobile: skip heavy crystal/vein/orb rendering
      if (isMobile) {
        // Simple fog only
        var fogGrad = ctx.createLinearGradient(0, 0, 0, H);
        fogGrad.addColorStop(0, pal.fog + 'cc');
        fogGrad.addColorStop(0.15, 'transparent');
        fogGrad.addColorStop(0.85, 'transparent');
        fogGrad.addColorStop(1, pal.fog + 'cc');
        ctx.fillStyle = fogGrad; ctx.globalAlpha = 0.45;
        ctx.fillRect(0, 0, W, H);
        ctx.globalAlpha = 1;
        return;
      }

      var chunkStart = Math.floor((camY / TILE) / BG_CHUNK) - 1;
      var chunkEnd = Math.ceil(((camY + H) / TILE) / BG_CHUNK) + 1;

      // layer 0: cristais grandes (mais escuros, atrás)
      for (var ci = chunkStart; ci <= chunkEnd; ci++) {
        var chunk = getBgChunk(ci);
        for (var i = 0; i < chunk.items.length; i++) {
          var it = chunk.items[i];
          if (it.type !== 'crystal' || it.layer !== 0) continue;
          var sy = it.y - camY;
          if (sy + it.h < -5 || sy > H + 5) continue;
          var pulse = (Math.sin(bgTick * it.spd + it.phase) + 1) * 0.5;
          var a = it.alpha * (0.7 + pulse * 0.3);
          drawCrystalShape(ctx, it.x, sy, it.w, it.h, it.flip);
          ctx.fillStyle = it.col; ctx.globalAlpha = a; ctx.fill();
        }
      }

      // orbs de luz
      for (var ci = chunkStart; ci <= chunkEnd; ci++) {
        var chunk = getBgChunk(ci);
        for (var i = 0; i < chunk.items.length; i++) {
          var it = chunk.items[i];
          if (it.type !== 'orb') continue;
          var sy = it.y - camY;
          if (sy + it.r < -5 || sy - it.r > H + 5) continue;
          var pulse = (Math.sin(bgTick * it.spd + it.phase) + 1) * 0.5;
          var orbR = it.r * (1 + pulse * 0.3);
          ctx.fillStyle = it.col; ctx.globalAlpha = it.alpha * (0.6 + pulse * 0.4);
          ctx.beginPath(); ctx.arc(it.x, sy, orbR, 0, Math.PI * 2); ctx.fill();
        }
      }

      // veias de minério
      for (var ci = chunkStart; ci <= chunkEnd; ci++) {
        var chunk = getBgChunk(ci);
        for (var i = 0; i < chunk.items.length; i++) {
          var it = chunk.items[i];
          if (it.type !== 'vein') continue;
          var sy1 = it.y1 - camY, sy2 = it.y2 - camY;
          if (Math.max(sy1, sy2) < -5 || Math.min(sy1, sy2) > H + 5) continue;
          var pulse = (Math.sin(bgTick * it.spd + it.phase) + 1) * 0.5;
          ctx.strokeStyle = it.col; ctx.lineWidth = it.w * (0.8 + pulse * 0.5);
          ctx.globalAlpha = it.alpha * (0.5 + pulse * 0.5);
          ctx.lineCap = 'round';
          ctx.beginPath(); ctx.moveTo(it.x1, sy1); ctx.lineTo(it.x2, sy2); ctx.stroke();
          ctx.strokeStyle = '#ffffff'; ctx.lineWidth = it.w * 0.3;
          ctx.globalAlpha = it.alpha * pulse * 0.6;
          ctx.beginPath(); ctx.moveTo(it.x1, sy1); ctx.lineTo(it.x2, sy2); ctx.stroke();
        }
      }

      // layers 1 e 2: cristais médios e pequenos
      for (var layer = 1; layer <= 2; layer++) {
        for (var ci = chunkStart; ci <= chunkEnd; ci++) {
          var chunk = getBgChunk(ci);
          for (var i = 0; i < chunk.items.length; i++) {
            var it = chunk.items[i];
            if (it.type !== 'crystal' || it.layer !== layer) continue;
            var sy = it.y - camY;
            if (sy + it.h < -5 || sy > H + 5) continue;
            var pulse = (Math.sin(bgTick * it.spd + it.phase) + 1) * 0.5;
            var a = it.alpha * (0.7 + pulse * 0.3);
            drawCrystalShape(ctx, it.x, sy, it.w, it.h, it.flip);
            ctx.fillStyle = it.col; ctx.globalAlpha = a; ctx.fill();
          }
        }
      }

      // névoa de profundidade nas bordas
      var fogGrad = ctx.createLinearGradient(0, 0, 0, H);
      fogGrad.addColorStop(0, pal.fog + 'cc');
      fogGrad.addColorStop(0.15, 'transparent');
      fogGrad.addColorStop(0.85, 'transparent');
      fogGrad.addColorStop(1, pal.fog + 'cc');
      ctx.fillStyle = fogGrad; ctx.globalAlpha = 0.45;
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;
    }

    // ── Water Pools in Clearings ────────────────────────────────────────────
    // Each even clearing (zone 2,4,6...) has a pool with fixed water volume.
    // Water fills from bottom up based on current geometry.
    var WATER_DRAG = 0.91;
    var poolVolumes = {}; // { zone: totalWaterTiles }
    var poolCells = {};   // { zone: Set of "r,c" strings that are water this frame }

    function hasPool(zone) {
      if (zone < 2 || zone % 2 !== 0) return false;
      // No pool if clearing overlaps with mega-clearing
      var zoneStart = zone * CLEARING_INTERVAL;
      var zoneEnd = zoneStart + CLEARING_HEIGHT;
      for (var cr = zoneStart - 10; cr <= zoneEnd + 10; cr++) {
        if (isMegaClearingRow(cr)) return false;
      }
      return true;
    }

    function initPool(zone) {
      if (poolVolumes[zone] !== undefined) return;
      var shape = getClearingShape(zone);
      var vol = 0;
      for (var lr = CLEARING_HEIGHT - 3; lr < CLEARING_HEIGHT; lr++) {
        var b = shape[lr];
        if (!b) continue;
        var width = b.right - b.left - 1;
        if (width > 0) vol += width;
      }
      poolVolumes[zone] = vol;
    }

    // Check if any wall/floor block of the clearing's water area has been broken
    function isPoolBreached(zone) {
      var shape = getClearingShape(zone);
      var zoneStart = zone * CLEARING_INTERVAL;
      // Check if wall blocks OUTSIDE the clearing (adjacent to water area) are broken
      for (var lr = CLEARING_HEIGHT - 3; lr < CLEARING_HEIGHT; lr++) {
        var b = shape[lr];
        if (!b) continue;
        var row = zoneStart + lr;
        if (!worldMap[row]) continue;
        // Left wall: block just outside clearing left edge
        var wl = b.left - 1;
        if (wl >= 0 && worldMap[row][wl] && worldMap[row][wl].t === E) return true;
        // Right wall: block just outside clearing right edge
        var wr = b.right + 1;
        if (wr < COLS && worldMap[row][wr] && worldMap[row][wr].t === E) return true;
      }
      // Floor: blocks just below the clearing bottom row
      var floorRow = zoneStart + CLEARING_HEIGHT;
      if (worldMap[floorRow]) {
        var botShape = shape[CLEARING_HEIGHT - 1];
        if (botShape) {
          for (var c = botShape.left + 1; c < botShape.right; c++) {
            if (worldMap[floorRow][c] && worldMap[floorRow][c].t === E) return true;
          }
        }
      }
      return false;
    }

    function computePool(zone) {
      var shape = getClearingShape(zone);
      var zoneStart = zone * CLEARING_INTERVAL;
      var vol = poolVolumes[zone] || 0;
      if (vol <= 0) { poolCells[zone] = new Set(); return; }

      var clearingBottom = zoneStart + CLEARING_HEIGHT;
      var breached = isPoolBreached(zone);

      // Phase 1: Find reachable empty cells via BFS from clearing
      var reachable = new Set();
      var queue = [];

      // Seed: all empty cells inside clearing
      for (var lr = 0; lr < CLEARING_HEIGHT; lr++) {
        var b = shape[lr];
        if (!b) continue;
        var row = zoneStart + lr;
        if (!worldMap[row]) continue;
        for (var c = b.left; c <= b.right; c++) {
          if (worldMap[row][c] && worldMap[row][c].t === E) {
            reachable.add(row + ',' + c);
            queue.push(row, c);
          }
        }
      }

      // BFS expand — no depth limit, but physics rules apply
      var maxCells = 500;
      var idx = 0;
      while (idx < queue.length && reachable.size < maxCells) {
        var qr = queue[idx++], qc = queue[idx++];
        var qLocal = qr - zoneStart;
        var insideClearing = false;
        if (qLocal >= 0 && qLocal < CLEARING_HEIGHT) {
          var qb = shape[qLocal];
          if (qb && qc >= qb.left && qc <= qb.right) insideClearing = true;
        }

        var dirs = [[qr-1,qc],[qr+1,qc],[qr,qc-1],[qr,qc+1]];
        for (var ni = 0; ni < 4; ni++) {
          var nr = dirs[ni][0], nc = dirs[ni][1];
          if (nc < 0 || nc >= COLS) continue;
          var nk = nr + ',' + nc;
          if (reachable.has(nk)) continue;
          if (!worldMap[nr] || !worldMap[nr][nc]) continue;
          if (worldMap[nr][nc].t !== E) continue;

          var nLocal = nr - zoneStart;
          var neighborInClearing = false;
          if (nLocal >= 0 && nLocal < CLEARING_HEIGHT) {
            var nb = shape[nLocal];
            if (nb && nc >= nb.left && nc <= nb.right) neighborInClearing = true;
          }

          if (neighborInClearing) {
            reachable.add(nk);
            queue.push(nr, nc);
          } else if (insideClearing) {
            if (nr >= qr) { reachable.add(nk); queue.push(nr, nc); }
          } else {
            // Outside clearing
            if (breached) {
              // Breached: water flows down and laterally (spreading while draining)
              if (nr >= qr) { reachable.add(nk); queue.push(nr, nc); }
            } else {
              // Intact: only straight down
              if (nr > qr && nc === qc) { reachable.add(nk); queue.push(nr, nc); }
            }
          }
        }
      }

      // Phase 2: Fill bottom-up, track how much is outside clearing
      var byRow = {};
      reachable.forEach(function(key) {
        var r = parseInt(key.split(',')[0]);
        if (!byRow[r]) byRow[r] = [];
        byRow[r].push(key);
      });
      var sortedRows = Object.keys(byRow).map(Number).sort(function(a,b){ return b - a; });
      var cells = new Set();
      var remaining = vol;
      var outsideCount = 0;
      for (var ri = 0; ri < sortedRows.length && remaining > 0; ri++) {
        var rowKeys = byRow[sortedRows[ri]];
        if (rowKeys.length <= remaining) {
          for (var i = 0; i < rowKeys.length; i++) {
            cells.add(rowKeys[i]);
            if (sortedRows[ri] >= clearingBottom) outsideCount++;
          }
          remaining -= rowKeys.length;
        } else {
          remaining = 0;
        }
      }

      // Volume is conserved unless pool is breached (wall/floor broken)
      if (breached) {
        // Drain slowly: lose 1 volume every few draw calls
        if (!poolVolumes[zone + '_drainTick']) poolVolumes[zone + '_drainTick'] = 0;
        poolVolumes[zone + '_drainTick']++;
        if (poolVolumes[zone + '_drainTick'] >= 30) { // ~0.5s per drain tick
          poolVolumes[zone + '_drainTick'] = 0;
          poolVolumes[zone] = Math.max(0, vol - 1);
        }
      }
      poolCells[zone] = cells;
    }

    function isInWater(px, py) {
      var r = Math.floor(py / TILE);
      var c = Math.floor(px / TILE);
      if (isMegaClearingRow(r)) return false;
      var zone = Math.floor(r / CLEARING_INTERVAL);
      if (!hasPool(zone)) return false;
      var cells = poolCells[zone];
      return cells && cells.has(r + ',' + c);
    }

    function drawWaterTable() {
      var t = Date.now() * 0.003;
      var rStart = Math.floor(camY / TILE);
      var rEnd = Math.ceil((camY + canvas.height) / TILE) + 1;
      var zoneMin = Math.max(2, Math.floor(rStart / CLEARING_INTERVAL));
      var zoneMax = Math.ceil(rEnd / CLEARING_INTERVAL);

      for (var zone = zoneMin; zone <= zoneMax; zone++) {
        if (!hasPool(zone)) continue;
        initPool(zone);
        computePool(zone);
        var cells = poolCells[zone];
        if (!cells || cells.size === 0) continue;

        var zoneStart = zone * CLEARING_INTERVAL;
        // Find top water row for surface wave
        var topWaterRow = Infinity;
        cells.forEach(function(key) {
          var row = parseInt(key.split(',')[0]);
          if (row < topWaterRow) topWaterRow = row;
        });

        cells.forEach(function(key) {
          var parts2 = key.split(',');
          var r = parseInt(parts2[0]);
          var c = parseInt(parts2[1]);
          var x = c * TILE;
          var y = r * TILE;
          var depthFromTop = r - topWaterRow;
          // Dilution: water outside clearing is more transparent
          var distFromClearing = Math.max(0, r - (zone * CLEARING_INTERVAL + CLEARING_HEIGHT));
          var dilution = Math.max(0.3, 1 - distFromClearing * 0.06);
          var alpha = (0.2 + depthFromTop * 0.06) * dilution;

          ctx.save();
          ctx.globalAlpha = Math.min(0.45, alpha);
          ctx.fillStyle = '#0a3a6a';
          ctx.fillRect(x, y, TILE, TILE);

          // Caustic shimmer
          ctx.globalAlpha = alpha * 0.25;
          ctx.fillStyle = '#4488cc';
          var cx1 = Math.sin(t * 1.5 + c * 0.8 + r * 0.3) * TILE * 0.3;
          var cy1 = Math.cos(t * 1.1 + r * 0.6 + c * 0.5) * TILE * 0.25;
          ctx.beginPath();
          ctx.arc(x + TILE * 0.5 + cx1, y + TILE * 0.5 + cy1, 11, 0, Math.PI * 2);
          ctx.fill();

          // Surface wave on top row
          if (r === topWaterRow) {
            ctx.globalAlpha = 0.5;
            ctx.beginPath();
            ctx.moveTo(x, y);
            for (var wx = 0; wx <= TILE; wx += 5) {
              var wy = y + Math.sin(t * 3 + (x + wx) * 0.06) * 2.5 + Math.sin(t * 1.8 + (x + wx) * 0.1) * 1.5;
              ctx.lineTo(x + wx, wy);
            }
            ctx.lineTo(x + TILE, y + 5);
            ctx.lineTo(x, y + 5);
            ctx.closePath();
            ctx.fillStyle = 'rgba(80, 160, 255, 0.35)';
            ctx.fill();
          }
          ctx.restore();
        });

        // Bubbles
        if (Math.random() < 0.03 && cells.size > 0) {
          var arr = Array.from(cells);
          var rk = arr[Math.floor(Math.random() * arr.length)].split(',');
          parts.push({
            x: parseInt(rk[1]) * TILE + Math.random() * TILE,
            y: parseInt(rk[0]) * TILE + Math.random() * TILE,
            vx: (Math.random() - 0.5) * 0.3,
            vy: -0.6 - Math.random() * 0.8,
            life: 20 + Math.random() * 25,
            color: 'rgba(150,200,255,0.5)',
            r: 2 + Math.random() * 3
          });
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackground(); // caverna de cristais
      ctx.save();
      var sx = shakeAmt > 0 ? (Math.random() - 0.5) * 2 * shakeAmt : 0;
      var sy = shakeAmt > 0 ? (Math.random() - 0.5) * 2 * shakeAmt : 0;
      ctx.translate(sx, sy - camY); // aplica câmera + tremor

      // linhas visíveis
      var rStart = Math.floor(camY / TILE);
      var rEnd = Math.ceil((camY + canvas.height) / TILE) + 1;

      for (var r = rStart; r <= rEnd; r++) {
        for (var c = 0; c < COLS; c++) {
          var cell = getCell(r, c);
          if (!cell || cell.t === E) continue;
          var x = c * TILE;
          var y = r * TILE;
          var tex = BTEX[cell.t];
          if (tex && tex.complete && tex.naturalWidth > 0) {
            ctx.drawImage(tex, x - 0.5, y - 0.5, TILE + 1, TILE + 1);
          } else {
            ctx.fillStyle = BDEF[cell.t].color;
            ctx.fillRect(x - 0.5, y - 0.5, TILE + 1, TILE + 1);
          }
          if (cell.cr > 0.01) {
            var stage = Math.min(9, Math.floor(cell.cr * 10));
            var dtex = DESTROY_TEX[stage];
            if (dtex && dtex.complete && dtex.naturalWidth > 0) {
              ctx.drawImage(dtex, x, y, TILE, TILE);
            }
          }
        }
      }

      // Water table overlay
      drawWaterTable();

      // Crystal decorations growing from clearing walls
      var viewTop = camY - TILE * 2;
      var viewBot = camY + canvas.height + TILE * 2;
      ctx.globalAlpha = 0.9;
      for (var ci = crystalDecoList.length - 1; ci >= 0; ci--) {
        var cd = crystalDecoList[ci];
        if (cd.y < viewTop || cd.y > viewBot) continue;
        // Remove crystal if its wall block was destroyed (check every ~30 frames to save perf)
        if ((bgTick + ci) % 30 === 0) {
          var wCell = getCell(cd.wallRow, cd.wallCol);
          if (!wCell || wCell.t === E) { crystalDecoList.splice(ci, 1); continue; }
        }
        var sprites = crystalSprites[cd.type];
        if (!sprites) continue;
        var cimg = sprites[cd.variant];
        if (!cimg || !cimg.complete) continue;
        var sz = TILE * cd.scale;
        ctx.save();
        ctx.translate(cd.x, cd.y);
        ctx.rotate(cd.rotation);
        ctx.drawImage(cimg, -sz / 2, -sz * 0.8, sz, sz);
        ctx.restore();
      }
      ctx.globalAlpha = 1;

      // ── Torches with light and shadow ──
      var tTime = Date.now() * 0.005;
      for (var ti = 0; ti < torchList.length; ti++) {
        var torch = torchList[ti];
        if (torch.y < viewTop - TILE * 3 || torch.y > viewBot + TILE * 3) continue;
        // Remove torch if wall block destroyed
        if ((bgTick + ti) % 60 === 0) {
          var twc = getCell(torch.wallRow, torch.wallCol);
          if (!twc || twc.t === E) { torchList.splice(ti, 1); ti--; continue; }
        }
        var tx = torch.x, ty = torch.y;
        var flicker = 0.7 + Math.sin(tTime * 3 + ti * 2.1) * 0.15 + Math.sin(tTime * 7 + ti * 5.3) * 0.1 + Math.random() * 0.05;
        var lightR = TILE * 6 * flicker;

        // Light glow (drawn behind everything via globalCompositeOperation)
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        var lg = ctx.createRadialGradient(tx, ty, 0, tx, ty, lightR);
        lg.addColorStop(0, 'rgba(255,180,60,' + (0.12 * flicker) + ')');
        lg.addColorStop(0.3, 'rgba(255,120,20,' + (0.06 * flicker) + ')');
        lg.addColorStop(1, 'rgba(255,80,0,0)');
        ctx.fillStyle = lg;
        ctx.beginPath(); ctx.arc(tx, ty, lightR, 0, Math.PI * 2); ctx.fill();
        ctx.globalCompositeOperation = 'source-over';
        ctx.restore();

        // Torch stick
        ctx.save();
        ctx.fillStyle = '#5a3a1a';
        ctx.fillRect(tx - 6, ty, 12, 54);
        // Torch head
        ctx.fillStyle = '#8a5a2a';
        ctx.fillRect(tx - 12, ty - 6, 24, 18);

        // Flame (animated)
        var fh = 30 + Math.sin(tTime * 4 + ti * 3) * 9;
        var fw = 15 + Math.sin(tTime * 6 + ti * 1.7) * 4.5;
        // Outer flame (orange)
        ctx.fillStyle = 'rgba(255,120,20,' + (0.8 * flicker) + ')';
        ctx.beginPath();
        ctx.moveTo(tx - fw, ty - 6);
        ctx.quadraticCurveTo(tx - fw * 0.3, ty - fh * 0.7, tx, ty - fh);
        ctx.quadraticCurveTo(tx + fw * 0.3, ty - fh * 0.7, tx + fw, ty - 6);
        ctx.fill();
        // Inner flame (yellow)
        ctx.fillStyle = 'rgba(255,220,80,' + (0.9 * flicker) + ')';
        ctx.beginPath();
        ctx.moveTo(tx - fw * 0.5, ty - 6);
        ctx.quadraticCurveTo(tx - fw * 0.15, ty - fh * 0.5, tx, ty - fh * 0.7);
        ctx.quadraticCurveTo(tx + fw * 0.15, ty - fh * 0.5, tx + fw * 0.5, ty - 6);
        ctx.fill();
        // Core (white-hot)
        ctx.fillStyle = 'rgba(255,255,200,' + (0.7 * flicker) + ')';
        ctx.beginPath();
        ctx.arc(tx, ty - 9, 7.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Occasional spark particle
        if (Math.random() < 0.02) {
          parts.push({
            x: tx + (Math.random() - 0.5) * 6,
            y: ty - fh - Math.random() * 5,
            vx: (Math.random() - 0.5) * 1.5,
            vy: -0.8 - Math.random() * 1.2,
            life: 0.6 + Math.random() * 0.4,
            dec: 0.03 + Math.random() * 0.02,
            r: 1 + Math.random() * 1.5,
            c: Math.random() < 0.5 ? '#ffcc44' : '#ff8800'
          });
        }
      }

      // partículas
      for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        ctx.globalAlpha = p.life; ctx.fillStyle = p.c;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;

      // detritos de blocos
      for (var d = 0; d < debris.length; d++) {
        var db = debris[d];
        var tex = BTEX[db.t];
        ctx.save();
        ctx.globalAlpha = db.life * 0.85; ctx.translate(db.x, db.y);
        ctx.rotate(db.ang);
        if (tex && tex.complete && tex.naturalWidth > 0) {
          ctx.drawImage(tex, -db.size / 2, -db.size / 2, db.size, db.size);
        } else {
          ctx.fillStyle = BDEF[db.t] ? BDEF[db.t].color : '#888';
          ctx.fillRect(-db.size / 2, -db.size / 2, db.size, db.size);
        }
        ctx.restore();
      }
      ctx.globalAlpha = 1;

      // itens colecionáveis
      for (var i = 0; i < items.length; i++) {
        var it = items[i];
        var itex = ITEX[it.t];
        if (itex && itex.complete && itex.naturalWidth > 0) {
          ctx.save();
          ctx.translate(it.x, it.y);
          ctx.rotate(it.ang);
          ctx.shadowBlur = 0;
          ctx.drawImage(itex, -16, -16, 32, 32);
          ctx.restore();
        }
      }

      // blocos TNT caindo
      for (var i = 0; i < tntBlocks.length; i++) {
        var b = tntBlocks[i];
        var glowSpeed = b.fuse <= 1 ? 8 : b.fuse <= 3 ? 4 : 1.5;
        var glow = (Math.sin(b.blinkTimer * 0.1 * glowSpeed) + 1) / 2;
        var drawSize = b.mega ? TILE * 1.8 : TILE;
        var tex = b.mega ? MEGA_TNT_TEX : TNT_TEX;
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.rotate(b.ang || 0);
        if (b.mega) {
          if (SHADOW_ENABLED) { ctx.shadowBlur = 15 + glow * 60; ctx.shadowColor = 'rgba(' + Math.floor(120 + glow * 80) + ',0,255,1)'; }
        } else {
          if (SHADOW_ENABLED) { ctx.shadowBlur = 10 + glow * 40; ctx.shadowColor = 'rgba(255,' + Math.floor(80 + glow * 100) + ',0,1)'; }
        }
        if (tex && tex.complete && tex.naturalWidth > 0) {
          ctx.drawImage(tex, -drawSize / 2, -drawSize / 2, drawSize, drawSize);
        } else {
          ctx.fillStyle = b.mega ? '#880088' : '#cc0000';
          ctx.fillRect(-drawSize / 2, -drawSize / 2, drawSize, drawSize);
        }
        ctx.restore();

        // Nome e Avatar do mensageiro da TNT
        if (b.userName) {
          ctx.save();
          var avImg = avatarCache[b.avatarUrl];
          var avSize = 32;
          var avY = b.y - drawSize / 2 - 28;
          if (avImg && avImg.complete && avImg.naturalWidth > 0) {
            ctx.save();
            ctx.beginPath(); ctx.arc(b.x - 5 - avSize / 2, avY, avSize / 2, 0, Math.PI * 2); ctx.clip();
            ctx.drawImage(avImg, b.x - 5 - avSize, avY - avSize / 2, avSize, avSize);
            ctx.restore();
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(b.x - 5 - avSize / 2, avY, avSize / 2, 0, Math.PI * 2); ctx.stroke();
          }
          ctx.fillStyle = '#fff'; ctx.font = 'bold 16px Arial'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
          if (SHADOW_ENABLED) { ctx.shadowBlur = 4; ctx.shadowColor = '#000'; }
          ctx.fillText(b.userName, b.x + 5, avY);
          ctx.restore();
        }
      }

      // explosões TNT
      for (var k = 0; k < explosions.length; k++) {
        var ex = explosions[k];
        var etex = EXPLOSION_TEX[ex.frame];
        if (etex && etex.complete && etex.naturalWidth > 0) {
          var esize = (ex.mega ? MEGA_TNT_RADIUS : TNT_RADIUS) * TILE * 2.5;
          ctx.globalAlpha = (1 - ex.frame / EXPLOSION_TEX.length) * 0.5;
          ctx.drawImage(etex, ex.x - esize / 2, ex.y - esize / 2, esize, esize);
        }
      }
      ctx.globalAlpha = 1;

      // zombies
      drawZombies();
      drawZombieBossBarrier();

      // bats
      drawBats();
      drawQueenBarrier();

      // textos flutuantes
      for (var j = 0; j < texts.length; j++) {
        var t = texts[j];
        ctx.globalAlpha = t.life; ctx.font = 'bold 13px Arial';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillStyle = t.c;
        ctx.fillText(t.txt, t.x, t.y);
      }
      ctx.globalAlpha = 1; ctx.shadowBlur = 0;

      // picareta principal - sprite
      if (pick) {
        drawTormentaAura(pick);
        drawSpinAura(pick);
        ctx.save();
        ctx.translate(pick.x, pick.y);
        ctx.rotate(pick.ang);
        var pimg = currentPickaxe.imgObj;
        if (pimg && pimg.complete && pimg.naturalWidth > 0) {
          ctx.drawImage(pimg, -PICK_HALF, -PICK_HALF, PICK_HALF * 2, PICK_HALF * 2);
        } else {
          ctx.fillStyle = currentPickaxe.color;
          ctx.fillRect(-PICK_HALF, -PICK_HALF, PICK_HALF * 2, PICK_HALF * 2);
        }
        ctx.restore();

        // Owner name & avatar on main pickaxe
        if (pick.userName) {
          ctx.save();
          var ownerAvImg = avatarCache[pick.userAvatarUrl];
          var oAvSize = isMobile ? 32 : 48;
          var oAvY = pick.y - PICK_HALF - (isMobile ? 30 : 44);
          if (ownerAvImg && ownerAvImg.complete && ownerAvImg.naturalWidth > 0) {
            ctx.save();
            ctx.beginPath(); ctx.arc(pick.x - 10 - oAvSize / 2, oAvY, oAvSize / 2, 0, Math.PI * 2); ctx.clip();
            ctx.drawImage(ownerAvImg, pick.x - 10 - oAvSize, oAvY - oAvSize / 2, oAvSize, oAvSize);
            ctx.restore();
            ctx.strokeStyle = '#ffdd44'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(pick.x - 10 - oAvSize / 2, oAvY, oAvSize / 2, 0, Math.PI * 2); ctx.stroke();
          }
          ctx.fillStyle = '#ffdd44'; ctx.font = isMobile ? 'bold 16px Arial' : 'bold 24px Arial'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
          if (SHADOW_ENABLED) { ctx.shadowBlur = 6; ctx.shadowColor = '#000'; }
          ctx.fillText(pick.userName, pick.x + 10, oAvY);
          ctx.restore();
        }
      }

      // picaretas extras (skill dupla + clones)
      for (var ei = 0; ei < extraPicks.length; ei++) {
        var ep = extraPicks[ei];
        ctx.save();
        ctx.translate(ep.x, ep.y);
        ctx.rotate(ep.ang);

        if (ep.cloneOwner) {
          // Clone: use owner's pickaxe and color glow
          var cloneAlpha = ep.cloneTimer < 120 ? (ep.cloneTimer / 120) : 1; // fade out last 2s
          ctx.globalAlpha = cloneAlpha;
          if (SHADOW_ENABLED) {
            ctx.shadowBlur = 10;
            ctx.shadowColor = ep.cloneColor || '#44ddff';
          }
          var cImg = (ep.clonePickaxe || currentPickaxe).imgObj;
          if (cImg && cImg.complete && cImg.naturalWidth > 0) {
            ctx.drawImage(cImg, -PICK_HALF, -PICK_HALF, PICK_HALF * 2, PICK_HALF * 2);
          } else {
            ctx.fillStyle = ep.cloneColor || '#44ddff';
            ctx.fillRect(-PICK_HALF, -PICK_HALF, PICK_HALF * 2, PICK_HALF * 2);
          }
          ctx.restore();
          // Draw clone avatar and name (same size as original picks)
          var cloneAvSize = isMobile ? 32 : 48;
          var cloneAvY = ep.y - PICK_HALF - (isMobile ? 30 : 44);
          if (ep.cloneAvatar && avatarCache[ep.cloneAvatar]) {
            var avImg = avatarCache[ep.cloneAvatar];
            if (avImg.complete && avImg.naturalWidth > 0) {
              ctx.save();
              ctx.globalAlpha = cloneAlpha * 0.85;
              ctx.beginPath(); ctx.arc(ep.x - 10 - cloneAvSize / 2, cloneAvY, cloneAvSize / 2, 0, Math.PI * 2); ctx.clip();
              ctx.drawImage(avImg, ep.x - 10 - cloneAvSize, cloneAvY - cloneAvSize / 2, cloneAvSize, cloneAvSize);
              ctx.restore();
              ctx.save();
              ctx.globalAlpha = cloneAlpha * 0.85;
              ctx.strokeStyle = ep.cloneColor || '#44ddff'; ctx.lineWidth = 2;
              ctx.beginPath(); ctx.arc(ep.x - 10 - cloneAvSize / 2, cloneAvY, cloneAvSize / 2, 0, Math.PI * 2); ctx.stroke();
              ctx.restore();
            }
          }
          ctx.save();
          ctx.globalAlpha = cloneAlpha * 0.85;
          ctx.fillStyle = '#fff'; ctx.font = isMobile ? 'bold 16px Arial' : 'bold 24px Arial'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
          if (SHADOW_ENABLED) { ctx.shadowBlur = 6; ctx.shadowColor = '#000'; }
          ctx.fillText(ep.cloneOwner || '', ep.x + 10, cloneAvY);
          ctx.restore();
        } else {
          // Original doublePick extra
          if (SHADOW_ENABLED) {
            var pulse = doublePickTimer > 0 ? (Math.sin(doublePickTimer * 0.15) * 0.5 + 0.5) : 1;
            ctx.shadowBlur = 8 + pulse * 6;
            ctx.shadowColor = '#44ddff';
          }
          var epimg = currentPickaxe.imgObj;
          if (epimg && epimg.complete && epimg.naturalWidth > 0) {
            ctx.drawImage(epimg, -PICK_HALF, -PICK_HALF, PICK_HALF * 2, PICK_HALF * 2);
          } else {
            ctx.fillStyle = '#44ddff';
            ctx.fillRect(-PICK_HALF, -PICK_HALF, PICK_HALF * 2, PICK_HALF * 2);
          }
          ctx.restore();
        }
      }

      // picaretas de outros usuários (permanentes com avatar)
      for (var ui = 0; ui < userPicks.length; ui++) {
        var up = userPicks[ui];
        drawTormentaAura(tormentaPick === up ? up : null);
        drawSpinAura(up);
        ctx.save();
        ctx.translate(up.x, up.y);
        ctx.rotate(up.ang);
        if (SHADOW_ENABLED) { ctx.shadowBlur = 12; ctx.shadowColor = up.color || '#00ff88'; }
        var uImg = (up.pickaxe || currentPickaxe).imgObj;
        if (uImg && uImg.complete && uImg.naturalWidth > 0) {
          ctx.drawImage(uImg, -PICK_HALF, -PICK_HALF, PICK_HALF * 2, PICK_HALF * 2);
        }
        ctx.restore();

        // nome e avatar
        ctx.save();
        var avImg = avatarCache[up.userAvatarUrl];
        var avSize = isMobile ? 32 : 48;
        var avY = up.y - PICK_HALF - (isMobile ? 30 : 44);
        if (avImg && avImg.complete && avImg.naturalWidth > 0) {
          ctx.save();
          ctx.beginPath(); ctx.arc(up.x - 10 - avSize / 2, avY, avSize / 2, 0, Math.PI * 2); ctx.clip();
          ctx.drawImage(avImg, up.x - 10 - avSize, avY - avSize / 2, avSize, avSize);
          ctx.restore();
          ctx.strokeStyle = up.color || '#fff'; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.arc(up.x - 10 - avSize / 2, avY, avSize / 2, 0, Math.PI * 2); ctx.stroke();
        }
        ctx.fillStyle = '#fff'; ctx.font = isMobile ? 'bold 16px Arial' : 'bold 24px Arial'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        if (SHADOW_ENABLED) { ctx.shadowBlur = 6; ctx.shadowColor = '#000'; }
        ctx.fillText(up.userName, up.x + 10, avY);
        ctx.restore();
      }

      ctx.restore(); // fim da câmera

      drawBoss(); // usa coordenadas de tela
    }

    function spawnBat(wx, wy, zone, isMother) {
      // Use higher cap during mega-clearings
      var batRow = Math.floor(wy / TILE);
      var inMega = isMegaClearingRow(batRow);
      var cap = inMega ? MAX_BATS_MEGA : MAX_BATS;
      if (bats.length >= cap) return;
      // Alternate: cycle bat → vesp → marimbondo per zone
      var flyType = FLYER_TYPES[zone % FLYER_TYPES.length];

      var minY, maxY, minX, maxX;
      if (inMega) {
        // Mega-clearing: wall-to-wall bounds
        var mz = getMegaZone(batRow);
        var megaStart = getMegaStart(mz >= 0 ? mz : 0);
        minX = TILE;
        maxX = (COLS - 1) * TILE;
        minY = megaStart * TILE + TILE * 8;
        maxY = (megaStart + MEGA_CLEARING_HEIGHT - 8) * TILE;
      } else {
        var shape = getClearingShape(zone);
        var zoneStart = zone * CLEARING_INTERVAL;
        minY = Infinity; maxY = -Infinity; minX = Infinity; maxX = -Infinity;
        for (var lr = 0; lr < CLEARING_HEIGHT; lr++) {
          var b = shape[lr];
          if (!b) continue;
          var ry = (zoneStart + lr) * TILE;
          if (ry < minY) minY = ry;
          if (ry + TILE > maxY) maxY = ry + TILE;
          if (b.left * TILE < minX) minX = b.left * TILE;
          if ((b.right + 1) * TILE > maxX) maxX = (b.right + 1) * TILE;
        }
      }
      var motherFlag = !!isMother;
      var hpVal = motherFlag ? 10 : 2;
      var ptsVal = motherFlag ? (100 + Math.floor(zone * 15)) : (30 + Math.floor(zone * 5));
      bats.push({
        x: wx, y: wy,
        vx: (Math.random() < 0.5 ? -1 : 1) * (1 + Math.random() * 1.5),
        vy: (Math.random() - 0.5) * 0.4,
        state: 'fly',
        anim: Math.random() * 18,
        dir: Math.random() < 0.5 ? -1 : 1,
        hp: hpVal, maxHp: hpVal,
        hurtTimer: 0,
        deadTimer: 0,
        zone: zone,
        flyType: flyType,
        isMother: motherFlag,
        lastSpawnTime: Date.now(),
        boundsMinX: minX + TILE, boundsMaxX: maxX - TILE,
        boundsMinY: minY + TILE * 0.5, boundsMaxY: maxY - TILE,
        flyPhase: Math.random() * Math.PI * 2,
        flyFreq: motherFlag ? 0.02 : (0.03 + Math.random() * 0.02),
        targetX: wx, targetY: wy,
        retargetTimer: 0,
        pts: ptsVal
      });
    }

    function spawnQueen(wx, wy, zone) {
      var flyType = FLYER_TYPES[zone % FLYER_TYPES.length];
      var megaStart = getMegaStart(zone);
      bats.push({
        x: wx, y: wy,
        vx: 0, vy: 0,
        state: 'fly',
        anim: Math.random() * 18,
        dir: Math.random() < 0.5 ? -1 : 1,
        hp: QUEEN_HP, maxHp: QUEEN_HP,
        hurtTimer: 0,
        deadTimer: 0,
        zone: zone,
        flyType: flyType,
        isMother: true,
        isQueen: true,
        lastSpawnTime: Date.now(),
        boundsMinX: wx - TILE * 2, boundsMaxX: wx + TILE * 2,
        boundsMinY: wy - TILE * 2, boundsMaxY: wy + TILE * 2,
        flyPhase: Math.random() * Math.PI * 2,
        flyFreq: 0.01,
        targetX: wx, targetY: wy,
        homeX: wx, homeY: wy,
        retargetTimer: 0,
        pts: 500 + zone * 50
      });
    }

    function updateBats() {
      for (var i = bats.length - 1; i >= 0; i--) {
        var b = bats[i];

        // Remove if too far above camera
        if (b.y < camY - 500) { bats.splice(i, 1); continue; }

        // ── DEAD ──
        if (b.state === 'dead') {
          b.deadTimer++;
          b.anim += BAT_ANIMS.dying.speed;
          if (b.anim >= BAT_ANIMS.dying.count) b.anim = BAT_ANIMS.dying.count - 0.01;
          // Fall with gravity
          b.vy += 0.2;
          b.y += b.vy;
          b.x += b.vx * 0.95;
          if (b.deadTimer > 90) { bats.splice(i, 1); }
          continue;
        }

        // ── HURT ──
        if (b.state === 'hurt') {
          b.hurtTimer--;
          b.anim += BAT_ANIMS.fall.speed;
          if (b.anim >= BAT_ANIMS.fall.count) b.anim = 0;
          b.vy += 0.05;
          b.y += b.vy;
          b.x += b.vx * 0.9;
          // Block collision while hurt
          var hHalf = BAT_SIZE * 0.35 * (b.isQueen ? QUEEN_SCALE : (b.isMother ? MOTHER_SCALE : 1));
          var hCol = Math.floor(b.x / TILE), hRow = Math.floor(b.y / TILE);
          for (var hr = hRow - 1; hr <= hRow + 1; hr++) {
            for (var hc = hCol - 1; hc <= hCol + 1; hc++) {
              var hCell = getCell(hr, hc);
              if (!hCell || hCell.t === E) continue;
              var htl = hc * TILE, htr = (hc + 1) * TILE, htt = hr * TILE, htb = (hr + 1) * TILE;
              var hcx = Math.max(htl, Math.min(b.x, htr));
              var hcy = Math.max(htt, Math.min(b.y, htb));
              var hdx = b.x - hcx, hdy = b.y - hcy;
              var hd = Math.sqrt(hdx * hdx + hdy * hdy);
              if (hd < hHalf) {
                if (hd > 0) { b.x += (hdx / hd) * (hHalf - hd); b.y += (hdy / hd) * (hHalf - hd); }
                else { b.y -= hHalf; }
                b.vx *= -0.3; b.vy *= -0.3;
              }
            }
          }
          if (b.hurtTimer <= 0) {
            b.state = 'fly'; b.anim = 0;
          }
          continue;
        }

        // ── FLY: erratic movement within clearing bounds ──
        b.flyPhase += b.flyFreq;

        // Queens: stay near home position, just hover
        if (b.isQueen) {
          b.x = b.homeX + Math.sin(b.flyPhase) * TILE * 0.5;
          b.y = b.homeY + Math.cos(b.flyPhase * 0.7) * TILE * 0.3;
          b.vx = 0; b.vy = 0;
          if (Math.abs(b.vx) > 0.3) b.dir = b.vx > 0 ? 1 : -1;
          b.anim += BAT_ANIMS.fly.speed;
          if (b.anim >= BAT_ANIMS.fly.count) b.anim = 0;
          // Queens also spawn babies
          var qNow = Date.now();
          if (qNow - b.lastSpawnTime >= MOTHER_SPAWN_MS) {
            b.lastSpawnTime = qNow;
            if (bats.length < MAX_BATS_MEGA) {
              spawnBat(b.x + (Math.random() - 0.5) * 60, b.y - 40, b.zone, false);
              spawnText(b.x, b.y + BAT_SIZE * 0.5, '🥚 Baby!', '#ff88ff');
            }
          }
          continue;
        }

        b.retargetTimer--;
        if (b.retargetTimer <= 0) {
          // Pick new target: mostly lateral movement (keep Y close, vary X widely)
          for (var rt = 0; rt < 5; rt++) {
            var tx = b.boundsMinX + Math.random() * (b.boundsMaxX - b.boundsMinX);
            // Keep Y within a small band around current position (±3 tiles)
            var yBand = TILE * 3;
            var tyMin = Math.max(b.boundsMinY, b.y - yBand);
            var tyMax = Math.min(b.boundsMaxY, b.y + yBand);
            var ty = tyMin + Math.random() * (tyMax - tyMin);
            var tc = getCell(Math.floor(ty / TILE), Math.floor(tx / TILE));
            if (!tc || tc.t === E) { b.targetX = tx; b.targetY = ty; break; }
          }
          b.retargetTimer = 60 + Math.floor(Math.random() * 120);
        }

        // Steer toward target (lateral bias)
        var dx = b.targetX - b.x;
        var dy = b.targetY - b.y;
        var dist = Math.sqrt(dx * dx + dy * dy) || 1;
        var accel = 0.12;
        b.vx += (dx / dist) * accel;
        b.vy += (dy / dist) * accel * 0.3 + Math.sin(b.flyPhase) * 0.03;

        // Speed limit
        var spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
        var maxSpd = 2.5;
        if (spd > maxSpd) { b.vx = (b.vx / spd) * maxSpd; b.vy = (b.vy / spd) * maxSpd; }

        // Damping
        b.vx *= 0.97;
        b.vy *= 0.97;

        b.x += b.vx;
        b.y += b.vy;

        // ── Block collision: push out of solid tiles ──
        var bHalf = BAT_SIZE * 0.35 * (b.isQueen ? QUEEN_SCALE : (b.isMother ? MOTHER_SCALE : 1));
        var bCol = Math.floor(b.x / TILE), bRow = Math.floor(b.y / TILE);
        // Check a small grid around the bat
        for (var cr = bRow - 1; cr <= bRow + 1; cr++) {
          for (var cc = bCol - 1; cc <= bCol + 1; cc++) {
            var cell = getCell(cr, cc);
            if (!cell || cell.t === E) continue;
            // Tile AABB
            var tl = cc * TILE, tr = (cc + 1) * TILE, tt = cr * TILE, tb = (cr + 1) * TILE;
            // Overlap check (circle vs AABB)
            var closestX = Math.max(tl, Math.min(b.x, tr));
            var closestY = Math.max(tt, Math.min(b.y, tb));
            var ddx = b.x - closestX, ddy = b.y - closestY;
            var dd = Math.sqrt(ddx * ddx + ddy * ddy);
            if (dd < bHalf) {
              // Push out
              if (dd > 0) {
                var pen = bHalf - dd;
                b.x += (ddx / dd) * pen;
                b.y += (ddy / dd) * pen;
              } else {
                b.y -= bHalf;
              }
              // Bounce velocity away from block
              if (ddx !== 0 || ddy !== 0) {
                var nd = Math.sqrt(ddx * ddx + ddy * ddy) || 1;
                b.vx = Math.abs(b.vx) * (ddx / nd) * 0.5;
                b.vy = Math.abs(b.vy) * (ddy / nd) * 0.5;
              }
            }
          }
        }

        // Clamp to bounds
        if (b.x < b.boundsMinX) { b.x = b.boundsMinX; b.vx = Math.abs(b.vx); }
        if (b.x > b.boundsMaxX) { b.x = b.boundsMaxX; b.vx = -Math.abs(b.vx); }
        if (b.y < b.boundsMinY) { b.y = b.boundsMinY; b.vy = Math.abs(b.vy); }
        if (b.y > b.boundsMaxY) { b.y = b.boundsMaxY; b.vy = -Math.abs(b.vy); }

        // Direction based on velocity
        if (Math.abs(b.vx) > 0.3) b.dir = b.vx > 0 ? 1 : -1;

        // Animate
        b.anim += BAT_ANIMS.fly.speed;
        if (b.anim >= BAT_ANIMS.fly.count) b.anim = 0;

        // Mother spawns babies every 4 seconds
        if (b.isMother && b.state === 'fly') {
          var now = Date.now();
          if (now - b.lastSpawnTime >= MOTHER_SPAWN_MS) {
            b.lastSpawnTime = now;
            if (bats.length < MAX_BATS) {
              spawnBat(b.x + (Math.random() - 0.5) * 40, b.y + 20, b.zone, false);
              spawnText(b.x, b.y + BAT_SIZE * 0.5, '🥚 Baby!', '#ff88ff');
            }
          }
        }
      }
    }

    function checkPickBatCollisions() {
      var PICK_R = 28;
      var allPicks = [pick].concat(userPicks, extraPicks);
      for (var pi = 0; pi < allPicks.length; pi++) {
        var p = allPicks[pi];
        if (!p || p.stuck) continue;
        var pSpeed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
        if (pSpeed < 1.2) continue;
        for (var bi = bats.length - 1; bi >= 0; bi--) {
          var b = bats[bi];
          if (b.state === 'dead' || b.state === 'hurt') continue;
          var BR = BAT_SIZE * 0.4 * (b.isQueen ? QUEEN_SCALE : (b.isMother ? MOTHER_SCALE : 1));
          var dx = p.x - b.x, dy = p.y - b.y;
          var dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < PICK_R + BR) {
            var nx = dist > 0 ? dx / dist : 0;
            var ny = dist > 0 ? dy / dist : -1;
            var bounceForce = Math.max(2.5, pSpeed * 0.5);
            p.vx = nx * bounceForce;
            p.vy = ny * bounceForce - 1.5;
            p.spin += (Math.random() - 0.5) * 0.2;
            p.x = b.x + nx * (PICK_R + BR + 1);
            p.y = b.y + ny * (PICK_R + BR + 1);

            // Queens are immune to normal hits — only Tormenta can kill them
            if (b.isQueen && QUEEN_IMMUNE) {
              // Strong bounce but no damage
              p.vx *= 1.5; p.vy *= 1.5;
              sfxBatHurt();
              spawnText(b.x, b.y - BAT_SIZE * 0.4, '🛡️ IMMUNE!', '#ff4444');
              registerComboHit(p, b.x, b.y);
              // Visual shake on queen
              b.x += (Math.random() - 0.5) * 6;
              break;
            }

            b.hp -= 1;
            b.hurtTimer = 10;
            b.anim = 0;
            b.vx += nx * -2;
            b.vy -= 1;
            sfxBatHurt();
            spawnText(b.x, b.y - BAT_SIZE * 0.4, '-1', '#ff88cc');
            registerComboHit(p, b.x, b.y);
            if (b.hp <= 0) {
              b.state = 'dead'; b.anim = 0; b.deadTimer = 0;
              score += b.pts;
              if (p.userName) {
                if (!persistentScores[p.userName]) persistentScores[p.userName] = { score: 0, avatar: p.userAvatarUrl || '' };
                persistentScores[p.userName].score += b.pts;
              }
              spawnText(b.x, b.y - BAT_SIZE * 0.5, '+' + b.pts, '#ffdd44');
              sfxBatDeath();
            } else {
              b.state = 'hurt';
            }
            break;
          }
        }
      }
    }

    // ── Queen Barrier Physical Collision ──────────────────────────────────
    function checkQueenBarrierCollisions() {
      var queens = [];
      for (var i = 0; i < bats.length; i++) {
        if (bats[i].isQueen && bats[i].state !== 'dead') queens.push(bats[i]);
      }
      if (queens.length === 0) return;
      queens.sort(function(a, b) { return a.x - b.x; });
      // Build barrier segments: wall-to-queen, queen-to-queen, queen-to-wall
      var segments = [];
      var wallL = TILE, wallR = (COLS - 1) * TILE;
      segments.push({ x1: wallL, y1: queens[0].y, x2: queens[0].x, y2: queens[0].y });
      for (var qi = 0; qi < queens.length - 1; qi++) {
        segments.push({ x1: queens[qi].x, y1: queens[qi].y, x2: queens[qi + 1].x, y2: queens[qi + 1].y });
      }
      segments.push({ x1: queens[queens.length - 1].x, y1: queens[queens.length - 1].y, x2: wallR, y2: queens[queens.length - 1].y });
      var BARRIER_THICK = 30;
      var allPicks = [pick].concat(userPicks, extraPicks);
      for (var pi = 0; pi < allPicks.length; pi++) {
        var p = allPicks[pi];
        if (!p || p.stuck) continue;
        for (var si = 0; si < segments.length; si++) {
          var seg = segments[si];
          // Simple horizontal-ish barrier: check if pick is near the line Y
          var minX = Math.min(seg.x1, seg.x2), maxX = Math.max(seg.x1, seg.x2);
          if (p.x < minX - 20 || p.x > maxX + 20) continue;
          // Interpolate Y at pick's X position
          var frac = (maxX - minX) > 0 ? (p.x - minX) / (maxX - minX) : 0.5;
          frac = Math.max(0, Math.min(1, frac));
          var lineY = seg.y1 + (seg.y2 - seg.y1) * frac;
          var dy = p.y - lineY;
          if (Math.abs(dy) < BARRIER_THICK && p.vy > 0.5) {
            // Bounce pick upward
            p.vy = -Math.abs(p.vy) * 0.7 - 2;
            p.y = lineY - BARRIER_THICK;
            p.spin += (Math.random() - 0.5) * 0.3;

    // ── Zombie Boss Barrier Physical Collision ───────────────────────────
    function checkZombieBossBarrierCollisions() {

    function drawBats() {
      for (var i = 0; i < bats.length; i++) {
        var b = bats[i];
        var animKey = b.state;
        if (animKey === 'hurt') animKey = 'fall';
        if (animKey === 'dead') animKey = 'dying';
        var spriteSet = flyerSprites[b.flyType] || flyerSprites.bat;
        var sprites = spriteSet[animKey] || spriteSet.fly;
        var frame = Math.min(Math.floor(b.anim), sprites.length - 1);
        if (frame < 0) frame = 0;
        var img = sprites[frame];
        if (!img || !img.complete || !img.naturalWidth) continue;

        ctx.save();
        ctx.translate(b.x, b.y);
        if (b.dir < 0) ctx.scale(-1, 1);

        if (b.state === 'hurt' && b.hurtTimer % 3 < 2) ctx.globalAlpha = 0.5;
        if (b.state === 'dead') ctx.globalAlpha = Math.max(0, 1 - b.deadTimer / 90);

        var w = BAT_SIZE, h = BAT_SIZE;
        if (b.isQueen) { w *= QUEEN_SCALE; h *= QUEEN_SCALE; }
        else if (b.isMother) { w *= MOTHER_SCALE; h *= MOTHER_SCALE; }

        // Queen aura glow
        if (b.isQueen && b.state !== 'dead') {
          if (b.dir < 0) ctx.scale(-1, 1);
          var qPulse = 0.6 + Math.sin(Date.now() * 0.005) * 0.4;
          var qGrad = ctx.createRadialGradient(0, 0, w * 0.2, 0, 0, w * 0.7);
          qGrad.addColorStop(0, 'rgba(255, 0, 80, ' + (0.2 * qPulse) + ')');
          qGrad.addColorStop(0.6, 'rgba(255, 50, 0, ' + (0.1 * qPulse) + ')');
          qGrad.addColorStop(1, 'rgba(255, 0, 0, 0)');
          ctx.fillStyle = qGrad;
          ctx.beginPath(); ctx.arc(0, 0, w * 0.7, 0, Math.PI * 2); ctx.fill();
          if (b.dir < 0) ctx.scale(-1, 1);
        }

        ctx.drawImage(img, -w / 2, -h / 2, w, h);

        // HP bar
        if (b.state !== 'dead' && b.hp < b.maxHp) {
          ctx.globalAlpha = 0.7;
          if (b.dir < 0) ctx.scale(-1, 1);
          var barW = b.isQueen ? 90 : (b.isMother ? 60 : 30);
          var barH = b.isQueen ? 8 : (b.isMother ? 6 : 4);
          var barX = -barW / 2, barY = -h / 2 - 8;
          ctx.fillStyle = '#333'; ctx.fillRect(barX, barY, barW, barH);
          ctx.fillStyle = b.isQueen ? '#ff0044' : (b.isMother ? '#ff2266' : '#ff66aa');
          ctx.fillRect(barX, barY, barW * (b.hp / b.maxHp), barH);
        }

        // Crown indicator
        if (b.isMother && b.state !== 'dead') {
          ctx.globalAlpha = 0.9;
          if (b.dir < 0) ctx.scale(-1, 1);
          ctx.font = b.isQueen ? 'bold 28px Arial' : 'bold 18px Arial';
          ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
          ctx.fillStyle = '#ffdd44';
          ctx.fillText(b.isQueen ? '👑👑👑' : '👑', 0, -h / 2 - 10);
        }

        ctx.globalAlpha = 1;
        ctx.restore();
      }
    }

    // ── Queen Energy Barrier ──────────────────────────────────────────────
    function drawQueenBarrier() {
      // Collect alive queens
      var queens = [];
      for (var i = 0; i < bats.length; i++) {
        if (bats[i].isQueen && bats[i].state !== 'dead') queens.push(bats[i]);
      }
      if (queens.length < 2) return;
      // Sort by X for consistent line drawing
      queens.sort(function(a, b) { return a.x - b.x; });
      var t = Date.now() * 0.003;
      ctx.save();
      // Draw barrier lines between adjacent queens
      for (var qi = 0; qi < queens.length - 1; qi++) {
        var q1 = queens[qi], q2 = queens[qi + 1];
        var pulse = 0.5 + Math.sin(t + qi) * 0.3;
        // Main energy beam
        ctx.strokeStyle = 'rgba(255, 0, 80, ' + (0.4 * pulse) + ')';
        ctx.lineWidth = 12 + Math.sin(t * 2 + qi) * 4;
        ctx.beginPath(); ctx.moveTo(q1.x, q1.y); ctx.lineTo(q2.x, q2.y); ctx.stroke();
        // Inner bright core
        ctx.strokeStyle = 'rgba(255, 100, 150, ' + (0.6 * pulse) + ')';
        ctx.lineWidth = 4 + Math.sin(t * 3) * 2;
        ctx.beginPath(); ctx.moveTo(q1.x, q1.y); ctx.lineTo(q2.x, q2.y); ctx.stroke();
        // Electric sparks along the line
        for (var s = 0; s < 5; s++) {
          var frac = (s + 0.5) / 5 + Math.sin(t * 4 + s * 1.3) * 0.05;
          var sx = q1.x + (q2.x - q1.x) * frac;
          var sy = q1.y + (q2.y - q1.y) * frac + Math.sin(t * 5 + s * 2) * 15;
          ctx.fillStyle = 'rgba(255, 200, 100, ' + (0.7 * pulse) + ')';
          ctx.beginPath(); ctx.arc(sx, sy, 3 + Math.random() * 3, 0, Math.PI * 2); ctx.fill();
        }
      }
      // Extend barrier to walls (left of first queen, right of last queen)
      var leftQ = queens[0], rightQ = queens[queens.length - 1];
      var wallLeft = TILE, wallRight = (COLS - 1) * TILE;
      var pL = 0.5 + Math.sin(t + 10) * 0.3;
      ctx.strokeStyle = 'rgba(255, 0, 80, ' + (0.3 * pL) + ')';
      ctx.lineWidth = 10 + Math.sin(t * 2 + 5) * 3;
      ctx.beginPath(); ctx.moveTo(wallLeft, leftQ.y); ctx.lineTo(leftQ.x, leftQ.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(rightQ.x, rightQ.y); ctx.lineTo(wallRight, rightQ.y); ctx.stroke();
      ctx.strokeStyle = 'rgba(255, 100, 150, ' + (0.5 * pL) + ')';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(wallLeft, leftQ.y); ctx.lineTo(leftQ.x, leftQ.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(rightQ.x, rightQ.y); ctx.lineTo(wallRight, rightQ.y); ctx.stroke();
      ctx.restore();
    }

    // Bat sound effects (high-pitched squeaks)
    function sfxBatHurt() {

    function spawnZombie(wx, wy) {

      var hp = 2;
      var spd = 0.4 + Math.random() * 0.4 + Math.min(depth / 100, 0.6);
      // Find safe Y: move up until not inside a solid block
      var safeY = wy - ZOMBIE_SIZE * 0.5;
      for (var sy = 0; sy < 5; sy++) {
        var checkRow = Math.floor((safeY + ZOMBIE_SIZE * 0.5) / TILE);
        var checkCol = Math.floor(wx / TILE);
        var cc = getCell(checkRow, checkCol);

      zombies.push({
        x: wx, y: safeY,

    function checkPickZombieCollisions() {
      var PICK_R = 28; // pick collision radius
      var allPicks = [pick].concat(userPicks, extraPicks);
      for (var pi = 0; pi < allPicks.length; pi++) {
        var p = allPicks[pi];
        if (!p || p.stuck) continue;
        var pSpeed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
        if (pSpeed < 1.5) continue; // too slow to deal damage
        for (var zi = zombies.length - 1; zi >= 0; zi--) {
          var z = zombies[zi];
          if (z.state === 'dead') continue;
          var ZR = ZOMBIE_SIZE * 0.45 * (z.isZBoss ? ZBOSS_SCALE : 1);
          var dx = p.x - z.x, dy = p.y - z.y;
          var dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < PICK_R + ZR) {
            // Bounce the pickaxe off the zombie
            var nx = dist > 0 ? dx / dist : 0;
            var ny = dist > 0 ? dy / dist : -1;
            var bounceForce = Math.max(3, pSpeed * 0.6);
            p.vx = nx * bounceForce;
            p.vy = ny * bounceForce - 2; // kick upward
            p.spin += (Math.random() - 0.5) * 0.3;
            // Push pick out of zombie
            p.x = z.x + nx * (PICK_R + ZR + 1);
            p.y = z.y + ny * (PICK_R + ZR + 1);

            // Zombie bosses are immune to normal hits — only Tormenta kills
            if (z.isZBoss && ZBOSS_IMMUNE) {
              p.vx *= 1.5; p.vy *= 1.5;
              sfxZombieHurt();
              spawnText(z.x, z.y - ZOMBIE_SIZE * 0.5, '🛡️ IMMUNE!', '#44ff44');
              registerComboHit(p, z.x, z.y);
              z.x += (Math.random() - 0.5) * 6;
              break;
            }

            // Damage zombie (1 hp)
            z.hp -= 1;
            z.state = 'hurt'; z.hurtTimer = 12; z.animTimer = 0;
            // Knockback zombie slightly
            z.vx += nx * -2;
            z.vy -= 1;
            sfxZombieHurt();
            spawnText(z.x, z.y - ZOMBIE_SIZE * 0.5, '-1', '#ff8844');
            registerComboHit(p, z.x, z.y);
            if (z.hp <= 0) {
              z.state = 'dead'; z.animTimer = 0; z.deadTimer = 0;
              score += z.pts;
              if (p.userName) {
                if (!persistentScores[p.userName]) persistentScores[p.userName] = { score: 0, avatar: p.userAvatarUrl || '' };
                persistentScores[p.userName].score += z.pts;
              }
              spawnText(z.x, z.y - ZOMBIE_SIZE * 0.6, '+' + z.pts, '#ffdd44');
              sfxZombieDeath();
            }
            break; // one zombie per pick per frame
          }
        }
      }
    }

    function updateZombies() {
      var ZG = 0.35;
      for (var i = zombies.length - 1; i >= 0; i--) {
        var z = zombies[i];

        // Remove if too far above camera
        if (z.y < camY - 400) { zombies.splice(i, 1); continue; }

        // ── DEAD: play full animation then remove ──
        if (z.state === 'dead') {
          z.deadTimer++;
          z.animTimer += ZOMBIE_ANIMS.dead.speed;
          if (z.animTimer >= ZOMBIE_ANIMS.dead.count) z.animTimer = ZOMBIE_ANIMS.dead.count - 0.01;
          // still apply gravity so corpse falls
          z.vy += ZG;
          if (isInWater(z.x, z.y)) { z.vx *= 0.85; z.vy *= 0.8; z.vy -= ZG * 0.8; }
          z.y += z.vy;
          var dFootRow = Math.floor((z.y + ZOMBIE_SIZE * 0.5) / TILE);
          var dGround = getCell(dFootRow, Math.floor(z.x / TILE));
          if (dGround && dGround.t !== E) { z.y = dFootRow * TILE - ZOMBIE_SIZE * 0.5; z.vy = 0; }
          if (z.deadTimer > 120) { zombies.splice(i, 1); }
          continue;
        }

        // ── HURT: play full hurt anim, then transition ──
        if (z.state === 'hurt') {
          z.hurtTimer--;
          z.animTimer += ZOMBIE_ANIMS.hurt.speed;
          // apply gravity during hurt
          z.vy += ZG;
          if (isInWater(z.x, z.y)) { z.vx *= 0.85; z.vy *= 0.8; z.vy -= ZG * 0.7; }
          z.y += z.vy;
          var hFootRow = Math.floor((z.y + ZOMBIE_SIZE * 0.5) / TILE);
          var hGround = getCell(hFootRow, Math.floor(z.x / TILE));
          if (hGround && hGround.t !== E) { z.y = hFootRow * TILE - ZOMBIE_SIZE * 0.5; z.vy = 0; }
          if (z.hurtTimer <= 0) {
            // transition to idle after hurt
            z.state = 'idle'; z.animTimer = 0;
          } else if (z.animTimer >= ZOMBIE_ANIMS.hurt.count) {
            z.animTimer = 0; // loop hurt if timer not done
          }
          continue;
        }

        // ── Zombie Boss: patrol left-right on brick floor ──
        if (z.isZBoss) {
          z.animTimer += ZOMBIE_ANIMS.walk.speed;
          if (z.animTimer >= ZOMBIE_ANIMS.walk.count) z.animTimer = 0;
          // Walk in current direction
          z.vx = z.dir * z.speed * 1.2;
          z.x += z.vx;
          // Reverse at patrol limits (2 tiles from walls)
          var bwL = TILE * 2, bwR = (COLS - 2) * TILE;
          if (z.x <= bwL) { z.x = bwL; z.dir = 1; }
          if (z.x >= bwR) { z.x = bwR; z.dir = -1; }
          // Lock to flat floor Y
          z.y = z.homeY;
          z.vy = 0;
          z.grounded = true;
          continue;
        }

        // ── Physics ──
        var wasGrounded = z.grounded;
        z.vy += ZG;
        // Water interaction: zombies slow down and float
        if (isInWater(z.x, z.y)) {
          z.vx *= 0.88;
          z.vy *= 0.85;
          z.vy -= ZG * 0.7; // buoyancy
        }
        z.x += z.vx;
        z.y += z.vy;

        // NaN/Infinity safety
        if (!isFinite(z.x) || !isFinite(z.y)) { zombies.splice(i, 1); continue; }
        if (!isFinite(z.vx)) z.vx = 0;
        if (!isFinite(z.vy)) z.vy = 0;

        // Ground check
        var footRow = Math.floor((z.y + ZOMBIE_SIZE * 0.5) / TILE);
        var footCol = Math.floor(z.x / TILE);
        var groundCell = getCell(footRow, footCol);
        z.grounded = false;
        if (groundCell && groundCell.t !== E && z.vy >= 0) {
          z.y = footRow * TILE - ZOMBIE_SIZE * 0.5;
          z.vy = 0;
          z.grounded = true;
        }

        // Landing transition: was airborne, now grounded
        if (!wasGrounded && z.grounded && z.state === 'jump') {
          z.state = 'idle'; z.animTimer = 0;
          z.fallFrames = 0;
        }

        // Track fall duration
        if (!z.grounded && z.vy > 0) {
          z.fallFrames++;
        }

        // Floor disappeared under zombie (block broken)
        if (wasGrounded && !z.grounded && z.state !== 'jump') {
          z.state = 'jump'; z.animTimer = 0; z.fallFrames = 0;
        }

        // Wall clamp
        var wallLeft = TILE + 1;
        var wallRight = (COLS - 1) * TILE - 1;
        if (z.x < wallLeft + ZOMBIE_SIZE * 0.4) { z.x = wallLeft + ZOMBIE_SIZE * 0.4; z.dir = 1; }
        if (z.x > wallRight - ZOMBIE_SIZE * 0.4) { z.x = wallRight - ZOMBIE_SIZE * 0.4; z.dir = -1; }

        // ── JUMP state: animate and wait for landing ──
        if (z.state === 'jump') {
          z.animTimer += ZOMBIE_ANIMS.jump.speed;
          if (z.animTimer >= ZOMBIE_ANIMS.jump.count) z.animTimer = ZOMBIE_ANIMS.jump.count - 0.01;
          // air friction
          z.vx *= 0.98;
          continue;
        }

        // ── GROUNDED STATES: idle, walk, run ──
        if (!z.grounded) {
          // fell off edge unexpectedly
          z.state = 'jump'; z.animTimer = 0; z.fallFrames = 0;
          continue;
        }

        // ── Spatial awareness ──
        var myRow = Math.floor(z.y / TILE);
        var myCol = footCol;

        // Check wall/block in direction
        var _scL = Math.floor((z.x - ZOMBIE_SIZE * 0.5) / TILE);
        var _cL = getCell(myRow, _scL);
        var blockedLeft = _cL && _cL.t !== E;
        var _scR = Math.floor((z.x + ZOMBIE_SIZE * 0.5) / TILE);
        var _cR = getCell(myRow, _scR);
        var blockedRight = _cR && _cR.t !== E;

        // Check gap in direction
        var _gapColL = Math.floor((z.x - TILE * 0.6) / TILE);

          z.animTimer += ZOMBIE_ANIMS.walk.speed;
          if (z.animTimer >= ZOMBIE_ANIMS.walk.count) z.animTimer = 0;
          z.idleTimer++;
          // Attack if pickaxe is close
          if (pickClose) {
            z.dir = nearPick.x > z.x ? 1 : -1;

          }

        vx: (Math.random() > 0.5 ? 1 : -1) * 2.2, vy: 0,
        hp: 60, maxHp: 60, size: 90, legPhase: 0,
        state: 'intro', stateTimer: 0, hurtTimer: 0,

    }

    function updateBoss() {

        boss.x += (pick.x - boss.x) * 0.02;

        if (bossIntr.timer >= bossIntr.duration) {
          bossIntr = null;
          boss.state = 'chase'; boss.stateTimer = 0;
        }
        return;
      }
      if (boss.dead) {
        boss.deathTimer--;
        if (boss.deathTimer <= 0) { stopBossMusic(); boss = null; }
        return;
      }
      boss.legPhase += 0.18;
      boss.stateTimer++;
      if (boss.hurtTimer > 0) boss.hurtTimer--;
      if (boss.webCooldown > 0) boss.webCooldown--;
      if (boss.diveCooldown > 0) boss.diveCooldown--;
      var dx = pick.x - boss.x, dy = pick.y - boss.y;
      var dist = Math.sqrt(dx * dx + dy * dy) || 1;
      var wallL = TILE + boss.size, wallR = canvas.width - TILE - boss.size;
      if (boss.state === 'chase') {
        var chaseTargetX = pick.x + (Math.random() - 0.5) * TILE * 2;
        var chaseTargetY = pick.y - boss.size * 1.8 - TILE;
        boss.vx += (chaseTargetX - boss.x) * 0.025 + boss.vx * 0.3;
        boss.vy += (chaseTargetY - boss.y) * 0.03;
        boss.vx += (chaseTargetX - boss.x) * 0.002;

          var baseAngle = Math.atan2(dy, dx);
          for (var wi = -1; wi <= 1; wi++) {
            var angle = baseAngle + wi * 0.32;
            boss.webs.push({ x: boss.x, y: boss.y + boss.size * 0.3, vx: Math.cos(angle) * 5.5, vy: Math.sin(angle) * 5.5, life: 160 });
          }
          boss.webCooldown = 65;
        }
        if (boss.diveCooldown <= 0 && boss.stateTimer > 80) {
          boss.state = 'dive'; boss.stateTimer = 0;
          boss.diveTargetY = pick.y - boss.size * 0.5;
          boss.diveCooldown = 280 + Math.floor(Math.random() * 160);
        }
      } else if (boss.state === 'dive') {
        boss.y += (boss.diveTargetY - boss.y) * 0.07;
        boss.x += (pick.x - boss.x) * 0.04;
        boss.x = Math.max(wallL, Math.min(wallR, boss.x));

        var mf = scaleFreq(mn.d, mn.oct);

        playNote(mf * 1.005, 'triangle', mn.vol * 0.4, 0.04, mn.dur * 1.4, t); // chorus leve
        melStep++;
      }

      // ── pad (a cada 4 beats) ──
      if (musicStep % 4 === 0) {
        var chord = PAD_CHORDS[padStep % PAD_CHORDS.length];
        for (var ci = 0; ci < chord.length; ci++) {
          var pf = scaleFreq(chord[ci], 1);
          playNote(pf, 'sine', 0.04, 0.15, BEAT * 3.5, t);
        }
        padStep++;
      }

      // ── glitter (nota aleatória ocasional) ──
      if (Math.random() < 0.25) {
        var gd = SCALE[Math.floor(Math.random() * SCALE.length)];
        var gf = ROOT * Math.pow(2, (gd + 36) / 12);
        playNote(gf, 'sine', 0.04, 0.01, 0.3, t + Math.random() * BEAT * 0.8);
      }

      musicStep++;
      musicTimeout = setTimeout(scheduleMusicBeat, BEAT * 1000);
    }

    // ── API Key Management System ──────────────────────────────────────────────
    var _userChannelId = localStorage.getItem('pd_channel_id') || '';
    var _activeApiKey = '';

    var _apiConnected = false;

    // ── API Key Pool System ──────────────────────────────────────────────────
    var _keyPool = [];        // [{key, status:'ok'|'failed', lastError:'', failedAt:0}]
    var _keyPoolIndex = 0;    // round-robin index
    var _keyRetestTimer = null;
    var _keyRetestInterval = 3600000; // retest failed keys every 1 hour

    function apiStatusText() {
      var ok = getOkKeyCount();
      return ok > 1 ? 'API: ' + ok + ' keys' : 'API: OK';
    }

    function getNextApiKey() {
      var okKeys = _keyPool.filter(function(k) { return k.status === 'ok'; });
      if (okKeys.length === 0) return '';
      _keyPoolIndex = (_keyPoolIndex + 1) % okKeys.length;
      _activeApiKey = okKeys[_keyPoolIndex].key;
      return _activeApiKey;
    }

    function getCurrentApiKey() {
      var okKeys = _keyPool.filter(function(k) { return k.status === 'ok'; });
      if (okKeys.length === 0) return '';
      if (_keyPoolIndex >= okKeys.length) _keyPoolIndex = 0;
      _activeApiKey = okKeys[_keyPoolIndex].key;
      return _activeApiKey;
    }

    function getOkKeyCount() {
      return _keyPool.filter(function(k) { return k.status === 'ok'; }).length;
    }

    function markKeyFailed(key, errorMsg) {
      _keyPool.forEach(function(k) {
        if (k.key === key) { k.status = 'failed'; k.lastError = errorMsg; k.failedAt = Date.now(); }
      });
      saveKeyPool();
      var okCount = getOkKeyCount();
      console.log('[KeyPool] Key failed:', key.substring(0, 8) + '...', errorMsg, '| OK keys left:', okCount);
      if (okCount > 0) {
        // Rotate to next OK key
        getNextApiKey();
        var txtApi = document.getElementById('statusTextApi');
        if (txtApi) { txtApi.textContent = 'API: ' + okCount + ' key(s)'; txtApi.style.color = '#ffaa00'; }
      } else {
        _apiConnected = false;
        _activeApiKey = '';
        // Don't show setup modal — just update status and retest
        var txtApi = document.getElementById('statusTextApi');
        if (txtApi) { txtApi.textContent = 'API: no keys (retesting...)'; txtApi.style.color = '#ff4444'; }
        startKeyRetest();
      }
      loadKeysList();
    }

    function saveKeyPool() {
      if (!_userChannelId) return;
      localStorage.setItem('pd_api_keys_' + _userChannelId, JSON.stringify(_keyPool));
    }

    function loadKeyPool() {
      if (!_userChannelId) { _keyPool = []; return; }
      try {
        _keyPool = JSON.parse(localStorage.getItem('pd_api_keys_' + _userChannelId) || '[]');
      } catch(e) { _keyPool = []; }
    }

    function startKeyRetest() {
      if (_keyRetestTimer) return;
      console.log('[KeyPool] Starting hourly retest of failed keys');
      _keyRetestTimer = setInterval(retestFailedKeys, _keyRetestInterval);
    }

    function retestFailedKeys() {
      var failedKeys = _keyPool.filter(function(k) { return k.status === 'failed'; });
      if (failedKeys.length === 0) {
        if (_keyRetestTimer) { clearInterval(_keyRetestTimer); _keyRetestTimer = null; }
        return;
      }
      console.log('[KeyPool] Retesting', failedKeys.length, 'failed key(s)...');
      var testChannel = _userChannelId;
      var pending = failedKeys.length;
      failedKeys.forEach(function(kObj) {
        var testUrl = 'https://www.googleapis.com/youtube/v3/channels?part=snippet&id=' + encodeURIComponent(testChannel) + '&key=' + encodeURIComponent(kObj.key);
        fetch(testUrl)
        .then(function(r) { return r.json().catch(function() { return { error: { code: 0, message: 'parse error' } }; }); })
        .then(function(data) {
          if (!data.error) {
            kObj.status = 'ok'; kObj.lastError = ''; kObj.failedAt = 0;
            console.log('[KeyPool] Key recovered:', kObj.key.substring(0, 8) + '...');
            if (!_apiConnected) {
              _activeApiKey = kObj.key;
              _apiConnected = true;
              dismissApiBanner();
              startApiPolling();
            }
          } else {
            console.log('[KeyPool] Key still failed:', kObj.key.substring(0, 8) + '...', data.error.message);
          }
          pending--;
          if (pending <= 0) { saveKeyPool(); loadKeysList(); }
        })
        .catch(function() { pending--; if (pending <= 0) { saveKeyPool(); loadKeysList(); } });
      });
    }

    function loadKeysList() {

        var container = document.getElementById('apiKeysList');

          html += '<span style="color:' + statusColor + ';">' + statusIcon + '</span>';
          html += '<span style="flex:1;color:' + (isActive ? '#fff' : '#ccc') + ';font-family:monospace;">' + masked + (isActive ? ' ◄' : '') + '</span>';
          html += '<span style="color:#666;font-size:10px;">' + (k.lastError || k.status) + '</span>';
          html += '</div>';
        });
        inner.innerHTML = html;
      } catch(e) {}

    function apiSetupTest() {
      var btn = document.getElementById('apiTestBtn');
      var errEl = document.getElementById('apiSetupError');
      var sucEl = document.getElementById('apiSetupSuccess');
      var channelId = document.getElementById('apiChannelInput').value.trim();
      var rawKeys = document.getElementById('apiKeyInput').value.trim();
      errEl.style.display = 'none';
      sucEl.style.display = 'none';

      if (!channelId) { errEl.style.display = 'block'; errEl.textContent = 'Channel ID is required.'; return; }
      if (!rawKeys) { errEl.style.display = 'block'; errEl.textContent = 'At least one API Key is required.'; return; }

      // Parse comma-separated keys
      var inputKeys = rawKeys.split(',').map(function(k) { return k.trim(); }).filter(function(k) { return k.length > 10; });
      if (inputKeys.length === 0) { errEl.style.display = 'block'; errEl.textContent = 'No valid API keys found.'; return; }

      btn.textContent = 'Testing ' + inputKeys.length + ' key(s)...';
      btn.disabled = true;

      _userChannelId = channelId;
      localStorage.setItem('pd_channel_id', channelId);
      loadKeyPool(); // load existing pool

      var tested = 0;
      var okCount = 0;
      var firstOkData = null;
      var errors = [];

      inputKeys.forEach(function(apiKey) {
        var testUrl = 'https://www.googleapis.com/youtube/v3/channels?part=snippet&id=' + encodeURIComponent(channelId) + '&key=' + encodeURIComponent(apiKey);
        fetch(testUrl)
        .then(function(r) { return r.json().catch(function() { return { error: { code: 0, message: 'parse error' } }; }); })
        .then(function(data) {
          tested++;
          if (data.error) {
            errors.push(apiKey.substring(0, 8) + '...: ' + (data.error.message || 'error'));
            // Add to pool as failed
            var exists = _keyPool.some(function(k) { return k.key === apiKey; });
            if (!exists) _keyPool.push({ key: apiKey, status: 'failed', lastError: data.error.message || 'test failed', failedAt: Date.now() });
            else _keyPool.forEach(function(k) { if (k.key === apiKey) { k.status = 'failed'; k.lastError = data.error.message || 'test failed'; k.failedAt = Date.now(); } });
          } else {
            okCount++;
            if (!firstOkData) firstOkData = data;
            // Add to pool as ok
            var exists2 = _keyPool.some(function(k) { return k.key === apiKey; });
            if (!exists2) _keyPool.push({ key: apiKey, status: 'ok', lastError: '', failedAt: 0 });
            else _keyPool.forEach(function(k) { if (k.key === apiKey) { k.status = 'ok'; k.lastError = ''; k.failedAt = 0; } });
          }
          if (tested >= inputKeys.length) finishTest();
        })
        .catch(function(e) {
          tested++;
          errors.push(apiKey.substring(0, 8) + '...: ' + e.message);
          if (tested >= inputKeys.length) finishTest();
        });
      });

      function finishTest() {
        btn.textContent = 'Test & Connect';
        btn.disabled = false;
        saveKeyPool();

        if (okCount === 0) {
          errEl.style.display = 'block';
          errEl.textContent = 'No valid keys found. Errors: ' + errors.join(' | ');
          loadKeysList();
          return;
        }

        // Auto-detect owner from first OK response
        if (firstOkData && firstOkData.items && firstOkData.items[0]) {
          var snippet = firstOkData.items[0].snippet;
          var channelTitle = snippet.title || '';
          var detectedOwner = snippet.customUrl || ('@' + snippet.title);
          if (detectedOwner && detectedOwner[0] !== '@') detectedOwner = '@' + detectedOwner;
          ownerName = detectedOwner;
          pick.userName = ownerName;
          var cfg = JSON.parse(localStorage.getItem('pd_config') || '{}');
          cfg.owner_name = ownerName;
          cfg.channel_title = channelTitle;
          localStorage.setItem('pd_config', JSON.stringify(cfg));
          if (!persistentScores[ownerName]) persistentScores[ownerName] = { score: 0, avatar: '', color: '#ffdd44' };
          var chAvatar = snippet.thumbnails && snippet.thumbnails.default ? snippet.thumbnails.default.url : '';
          if (chAvatar) {
            pick.userAvatarUrl = chAvatar;
            persistentScores[ownerName].avatar = chAvatar;
            if (!avatarCache[chAvatar]) {
              var avImg = new Image(); avImg.crossOrigin = 'anonymous'; avImg.src = chAvatar;
              avatarCache[chAvatar] = avImg;
            }
          }
        }

        _keyPoolIndex = 0;
        getCurrentApiKey();
        _liveChatId = '';
        localStorage.removeItem('pd_live_chat_' + channelId);
        _apiConnected = true;
        _gameStarted = true;

        sucEl.style.display = 'block';
        sucEl.textContent = okCount + '/' + inputKeys.length + ' keys OK! Pool active with round-robin.' + (errors.length > 0 ? ' (' + errors.length + ' failed)' : '');

        var flBtn = document.getElementById('apiFindLiveBtn');
        if (flBtn) flBtn.style.display = 'inline-block';
        loadKeysList();
        if (errors.length > 0) startKeyRetest();

        setTimeout(function() {
          hideApiSetup();
          var liveInput = document.getElementById('apiLiveIdInput').value.trim();
          if (liveInput) {
            apiConnectLiveById();
          } else {
            startApiPolling();
          }
        }, 1500);
      }
    }

    function apiConnectLiveById() {
      var input = document.getElementById('apiLiveIdInput').value.trim();
      var btn = document.getElementById('apiLiveIdBtn');
      var sucEl = document.getElementById('apiSetupSuccess');
      var errEl = document.getElementById('apiSetupError');
      errEl.style.display = 'none'; sucEl.style.display = 'none';
      var apiKey = getCurrentApiKey();
      if (!apiKey) { errEl.style.display = 'block'; errEl.textContent = 'Connect an API key first (Test & Connect).'; return; }
      if (!input) { errEl.style.display = 'block'; errEl.textContent = 'Enter a live video URL or ID.'; return; }
      // Extract video ID from various URL formats
      var videoId = input;
      var urlMatch = input.match(/[?&]v=([a-zA-Z0-9_-]{11})/) || input.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/) || input.match(/\/live\/([a-zA-Z0-9_-]{11})/) || input.match(/^([a-zA-Z0-9_-]{11})$/);
      if (urlMatch) videoId = urlMatch[1];
      videoId = videoId.replace(/[^a-zA-Z0-9_-]/g, '');
      console.log('[ConnectLive] Input:', input, '→ videoId:', videoId, 'apiKey:', apiKey ? 'set' : 'EMPTY', 'channelId:', _userChannelId);
      if (!videoId || videoId.length < 8) { errEl.style.display = 'block'; errEl.textContent = 'Invalid video ID or URL.'; return; }
      btn.textContent = 'Connecting...'; btn.disabled = true;
      fetch('https://www.googleapis.com/youtube/v3/videos?part=liveStreamingDetails&id=' + encodeURIComponent(videoId) + '&key=' + encodeURIComponent(apiKey))

    function tryLoadActiveKey(callback) {
      if (!_userChannelId) { callback(false); return; }
      try {
        loadKeyPool();
        var savedChat = localStorage.getItem('pd_live_chat_' + _userChannelId);
        _liveChatId = savedChat || '';

        if (getOkKeyCount() > 0) {
          getCurrentApiKey();

          fetch('https://www.googleapis.com/youtube/v3/channels?part=snippet&id=' + encodeURIComponent(_userChannelId) + '&key=' + encodeURIComponent(_activeApiKey))
          .then(function(r) { return r.json().catch(function() { throw new Error('Network error: ' + r.status); }); })
          .then(function(data) {
            if (data.items && data.items[0]) {

              var detectedOwner = snippet.customUrl || ('@' + snippet.title);
